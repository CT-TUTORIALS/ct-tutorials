<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admins Portal | C&T Tutorials</title>

<style>
body{margin:0;font-family:"Segoe UI", Arial, sans-serif;background:#f4f4f4;color:#333;line-height:1.6;}
header{background:#003366;color:white;padding:20px;text-align:center;}
nav{margin-top:10px;display:flex;justify-content:center;flex-wrap:wrap;gap:15px;}
nav a{color:white;text-decoration:none;font-weight:bold;cursor:pointer;}
nav a:hover{text-decoration:underline;}
.main-content{max-width:1100px;margin:auto;padding:50px 40px;background:white;}
h2{color:#003366;border-bottom:2px solid #003366;padding-bottom:8px;margin-bottom:25px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:8px;text-align:left;}
th{background:#003366;color:white;}
button{padding:6px 12px;margin:2px;border:none;border-radius:4px;cursor:pointer;}
.approve{background:#28a745;color:white;}
.decline{background:#dc3545;color:white;}
.close{position:absolute;right:15px;top:10px;font-size:22px;cursor:pointer;border:none;background:none;}
#adminModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:1000;}
#adminModal form{background:white;padding:25px;width:90%;max-width:500px;border-radius:10px;position:relative;}
.submit-btn{margin-top:20px;width:100%;padding:12px;background:#003366;color:white;border:none;cursor:pointer;border-radius:5px;font-size:16px;}
.submit-btn:hover{background:#00509e;}
</style>
</head>
<body>

<header>
<h1>Admins Portal | C&T Tutorials</h1>
<nav>
<a href="index.html">Home</a>
<a href="tutors.html">Tutors Portal</a>
</nav>
</header>

<div class="main-content">
<h2>Tutor Applications</h2>
<table id="tutorTable">
<thead>
<tr>
<th>#</th>
<th>Full Name</th>
<th>Email</th>
<th>Phone</th>
<th>Subjects</th>
<th>Qualification</th>
<th>Experience</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
<tr><td colspan="9">Loading applications...</td></tr>
</tbody>
</table>
</div>

<!-- ADMIN LOGIN POPUP -->
<div id="adminModal">
<form>
<button type="button" class="close" onclick="closeAdmin()">×</button>
<h2>Admin Login</h2>
<label>Username<input type="text" required></label>
<label>Password<input type="password" required></label>
<button class="submit-btn">Login</button>
</form>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6fZNU0Tx42fTIoh0W8iZgHbQ-hWuqCvXFPZhmVlZEU2tKYpn1CEQjt0UKBLwGGN7qnQ/exec";

/* Load tutor applications */
function loadApplications(){
  fetch(SCRIPT_URL+"?action=getAllTutors")
  .then(res=>res.json())
  .then(data=>{
    const tbody=document.querySelector("#tutorTable tbody");
    tbody.innerHTML="";
    if(data.length===0){tbody.innerHTML="<tr><td colspan='9'>No applications found.</td></tr>";return;}
    data.forEach((tutor,index)=>{
      const row=document.createElement("tr");
      row.innerHTML=`
        <td>${index+1}</td>
        <td>${tutor.name}</td>
        <td>${tutor.email}</td>
        <td>${tutor.phone}</td>
        <td>${tutor.subjects}</td>
        <td>${tutor.qualification}</td>
        <td>${tutor.experience}</td>
        <td>${tutor.status}</td>
        <td>
          <button class="approve" onclick="updateStatus(${index},'Approved')">Approve</button>
          <button class="decline" onclick="updateStatus(${index},'Declined')">Decline</button>
        </td>
      `;
      tbody.appendChild(row);
    });
  })
  .catch(err=>console.error("Error loading applications:",err));
}

/* Update application status */
function updateStatus(index,status){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({action:"updateStatus",index:index,status:status})
  })
  .then(res=>res.json())
  .then(()=>loadApplications())
  .catch(()=>alert("Error updating status"));
}

/* Admin login modal */
function closeAdmin(){document.getElementById("adminModal").style.display="none";}
function openAdmin(){document.getElementById("adminModal").style.display="flex";}
window.onclick=function(event){
  if(event.target==document.getElementById("adminModal")){closeAdmin();}
}

/* Load applications on page load */
loadApplications();
</script>

</body>
</html>
