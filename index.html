<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
padding:0;
background:#f4f6f8;
}

header{
background:#002147;
color:white;
padding:15px;
text-align:center;
}

.hero{
padding:40px;
text-align:center;
background:#e9eef5;
}

button{
padding:12px 20px;
background:#002147;
color:white;
border:none;
cursor:pointer;
border-radius:6px;
}

footer{
background:#002147;
color:white;
padding:20px;
text-align:center;
margin-top:40px;
}

/* Modal */
.modal{
display:none;
position:fixed;
z-index:1;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;
padding:20px;
margin:10% auto;
width:90%;
max-width:500px;
border-radius:10px;
}

/* Floating Buttons */
.float-btn{
position:fixed;
right:20px;
padding:15px;
border-radius:50px;
color:white;
border:none;
cursor:pointer;
}

#registerBtnFloat{
bottom:20px;
background:#002147;
}

#tutorCornerFloat{
bottom:80px;
background:#008080;
}
</style>
</head>

<body>

<header>
<h1>C&T Tutorials</h1>
</header>

<section class="hero">
<h2>Welcome to C&T Tutorials</h2>
<p>Your academic success partner.</p>

<button id="openModalBtn">Register Now</button>
</section>

<!-- BOOKING MODAL -->
<div id="bookingModal" class="modal">
<div class="modal-content">

<h3>Book Tutorial Service</h3>

<form id="bookingForm">

<input type="text" id="name" placeholder="Full Name" required><br><br>
<input type="email" id="email" placeholder="Email" required><br><br>

<select id="service" required>
<option value="">Select Service</option>
<option value="online">Online Tutoring</option>
<option value="physical">Face-to-Face Tutoring</option>
</select><br><br>

<!-- Tutor Selection (hidden first) -->
<select id="tutorSelect" style="display:none;"></select><br><br>

<textarea id="notes" placeholder="Additional Notes"></textarea><br><br>

<button type="submit">Submit Booking</button>
</form>

</div>
</div>

<!-- FLOATING BUTTONS -->
<button id="registerBtnFloat" class="float-btn">Register</button>
<button id="tutorCornerFloat" class="float-btn" onclick="window.location.href='tutors.html'">
Tutors' Corner
</button>

<footer>
<p>© 2026 C&T Tutorials. All rights reserved.</p>
</footer>

<!-- FIREBASE + SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAJIoUss8lPbrVlFzkBcgf3l62tRQgQ9Ng",
authDomain: "ct-tutorials-web.firebaseapp.com",
projectId: "ct-tutorials-web",
storageBucket: "ct-tutorials-web.firebasestorage.app",
messagingSenderId: "369659340275",
appId: "1:369659340275:web:b081919e9dea8453241e86"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* MODAL CONTROLS */
const modal = document.getElementById("bookingModal");
document.getElementById("openModalBtn").onclick = () => modal.style.display = "block";
document.getElementById("registerBtnFloat").onclick = () => modal.style.display = "block";

window.onclick = (e)=>{
if(e.target==modal) modal.style.display="none";
}

/* LOAD TUTORS WHEN SERVICE SELECTED */
document.getElementById("service").addEventListener("change", async ()=>{
const tutorSelect = document.getElementById("tutorSelect");

if(document.getElementById("service").value !== ""){
tutorSelect.style.display="block";
tutorSelect.innerHTML='<option>Select Tutor</option>';

const snapshot = await getDocs(collection(db,"tutors"));
snapshot.forEach(doc=>{
const t = doc.data();
const opt = document.createElement("option");
opt.value = t.name;
opt.textContent = t.name + " (" + t.subject + ")";
tutorSelect.appendChild(opt);
});
}else{
tutorSelect.style.display="none";
}
});

/* SUBMIT BOOKING */
document.getElementById("bookingForm").addEventListener("submit", async(e)=>{
e.preventDefault();

await addDoc(collection(db,"bookings"),{
name: document.getElementById("name").value,
email: document.getElementById("email").value,
service: document.getElementById("service").value,
tutor: document.getElementById("tutorSelect").value,
notes: document.getElementById("notes").value,
createdAt: new Date()
});

alert("Booking submitted successfully!");
modal.style.display="none";
});

</script>

</body>
</html>
