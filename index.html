.service-link{display:inline-block;margin-top:12px;font-weight:bold;color:#003366;cursor:pointer;}

.floating-btn{position:fixed;bottom:25px;right:25px;background:#003366;color:white;padding:15px 22px;border:none;border-radius:40px;font-size:16px;cursor:pointer;box-shadow:0 4px 6px rgba(0,0,0,0.3);}

#modal form,#pricingContent{background:white;padding:25px;width:90%;max-width:500px;border-radius:10px;position:relative;}

.submit-btn{margin-top:20px;width:100%;padding:12px;background:#003366;color:white;border:none;border-radius:5px;cursor:pointer;}
.submit-btn:hover{background:#00509e;}
footer{background:#003366;color:white;text-align:center;padding:25px;}
.footer-disclaimer{font-size:12px;max-width:900px;margin:auto;line-height:1.6;}

<body>

<!-- (UNCHANGED HTML CONTENT — EXACTLY YOURS) -->

<!-- KEEP EVERYTHING ABOVE EXACTLY AS YOU HAD IT -->

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxIShwbw27ViNIHCShqkhJv4WaQ0igIE9AQ44FGT9RL1ik4rqeOzi01liVl4vjCFhNqQw/exec";

const modal=document.getElementById("modal");
const pricingModal=document.getElementById("pricingModal");
const pricingTitle=document.getElementById("pricingTitle");
const pricingDetails=document.getElementById("pricingDetails");

let selectedService="";
const serviceSelect=document.getElementById("serviceSelect");
const tutorSelect=document.getElementById("tutorSelect");
const tutorLabel=document.getElementById("tutorLabel");

/* CORE FUNCTIONS */

function openForm(){ modal.style.display="flex"; }
function closeForm(){ modal.style.display="none"; }

/* PRICING (WORKING) */

function openPricing(service){

pricingModal.style.display="flex";
selectedService=service;

if(service==="writing"){
pricingTitle.innerText="Academic Writing Tutorials";
pricingDetails.innerHTML=`
<p>Introduction to Academic Writing (4 sessions) – <b>N$150</b></p>
<p>Topic Specific Sessions – <b>N$40</b></p>
<p>Hourly Rate – <b>N$40</b></p>`;
}

if(service==="group"){
pricingTitle.innerText="Group Learning Sessions";
pricingDetails.innerHTML=`
<p>2 – 5 People – <b>N$200</b></p>
<p>6 – 14 People – <b>N$450</b></p>
<p>More than 14 People – <b>N$600</b></p>`;
}

if(service==="assignment"){
pricingTitle.innerText="Assignment Support";
pricingDetails.innerHTML=`
<p>Draft Editing – <b>N$15 per page</b></p>
<p>Proofreading – <b>N$10 per page</b></p>
<p>Referencing Assistance – <b>N$20</b></p>`;
}

if(service==="speaking"){
pricingTitle.innerText="Public Speaking Support";
pricingDetails.innerHTML=`
<p>Coaching Session – <b>N$40</b></p>`;
}

}

function bookService(){
pricingModal.style.display="none";

if(selectedService==="writing") serviceSelect.value="Intro Academic Writing";
if(selectedService==="group") serviceSelect.value="Group Sessions";
if(selectedService==="assignment") serviceSelect.value="Draft Editing";
if(selectedService==="speaking") serviceSelect.value="Public Speaking Support";

serviceSelect.dispatchEvent(new Event("change"));
openForm();
}

/* ✅ RESTORED TUTOR LOGIC */

let tutorsData={};

async function loadTutors(){
try{
const response=await fetch(SCRIPT_URL+"?action=getTutors");
tutorsData=await response.json();
}catch(err){
console.error(err);
}
}

loadTutors();

serviceSelect.addEventListener("change",function(){

let tutorCategory="";
const service=this.value;

if(service==="Intro Academic Writing" || service==="Topic Specific" || service==="Hourly Rate") tutorCategory="writing";
else if(service==="Group Sessions") tutorCategory="group";
else if(service==="Draft Editing" || service==="Proofreading" || service==="Referencing Assistance") tutorCategory="assignment";
else if(service==="Public Speaking Support") tutorCategory="speaking";
else if(service==="Secondary School Subjects") tutorCategory="secondary";

if(tutorsData[tutorCategory]){
tutorLabel.style.display="block";
tutorSelect.innerHTML='<option value="">Select a tutor</option>';

tutorsData[tutorCategory].forEach(function(t){
const option=document.createElement("option");
option.value=t.trim();
option.textContent=t.trim();
tutorSelect.appendChild(option);
});

}else{
tutorLabel.style.display="none";
}

});

/* FORM SUBMIT */

document.getElementById("studentRegisterForm").addEventListener("submit",function(e){

e.preventDefault();

fetch(SCRIPT_URL,{
method:"POST",
body:new FormData(this)
})
.then(()=>{
alert("Registration submitted successfully.");
this.reset();
closeForm();
})
.catch(()=>alert("Submission error. Please try again."));

});

/* MODAL CLOSE */

window.onclick=function(e){
if(e.target===modal) closeForm();
if(e.target===pricingModal) pricingModal.style.display="none";
};

</script>

</body>
</html>
