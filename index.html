<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials - Registration</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <nav>
    <a href="index.html">Home</a>
    <a href="tutors.html">Tutors</a>
    <a href="admin.html">Admin</a>
  </nav>
</div>

<section class="main-content">
  <h2>Register for a Tutorial</h2>
  <form id="registrationForm">
    <label>Name
      <input type="text" name="name" required>
    </label>
    <label>Email
      <input type="email" name="email" required>
    </label>
    <label>Cell Number
      <input type="tel" name="cell_number" required>
    </label>
    <label>Service
      <select name="service" required>
        <option value="">Select Service</option>
        <option value="Math Tutoring">Math Tutoring</option>
        <option value="Science Tutoring">Science Tutoring</option>
      </select>
    </label>
    <label>Tutor
      <select name="tutor" id="tutorSelect" required>
        <option value="">Loading tutors...</option>
      </select>
    </label>
    <button type="submit" class="submit-btn">Register</button>
  </form>
</section>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/.../exec";

// Load tutors dynamically
function fetchTutors() {
  fetch(`${SCRIPT_URL}?action=getTutors`)
    .then(res => res.json())
    .then(tutors => {
      const select = document.getElementById("tutorSelect");
      select.innerHTML = '<option value="">Select Tutor</option>';
      tutors.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t.name;
        opt.textContent = `${t.name} (${t.subject})`;
        select.appendChild(opt);
      });
    });
}

fetchTutors();

// Submit registration
document.getElementById("registrationForm").addEventListener("submit", function(e){
  e.preventDefault();
  const formData = {
    name: this.name.value,
    email: this.email.value,
    cell_number: this.cell_number.value,
    service: this.service.value,
    tutor: this.tutor.value
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(formData)
  })
  .then(res => res.json())
  .then(res => {
    if(res.status === "success") {
      alert("Registration successful!");
      this.reset();
    } else {
      alert("Error submitting form. Try again.");
    }
  });
});
</script>

</body>
</html>
