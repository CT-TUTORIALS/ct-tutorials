<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials Tutors Portal</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.main{
max-width:900px;
margin:auto;
background:white;
padding:40px;
}

button{
background:#003366;
color:white;
border:none;
padding:12px 20px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#00509e;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal form{
background:white;
padding:25px;
width:90%;
max-width:500px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
}

</style>
</head>

<body>

<header>
<h1>C&T Tutorials Tutor Portal</h1>
</header>

<div class="main">

<h2>Welcome Tutors</h2>

<p>
Apply to become a tutor or create your tutor account once approved.
</p>

<button onclick="openApply()">Apply to Become Tutor</button>
<button onclick="openCreate()">Create Tutor Account</button>

</div>

<!-- APPLY MODAL -->

<div id="applyModal" class="modal">

<form id="tutorForm">

<h2>Tutor Application</h2>

<label>Full Name</label>
<input id="name" required>

<label>Email</label>
<input id="email" required>

<label>Phone</label>
<input id="phone" required>

<label>Subjects</label>
<input id="subjects" required>

<label>Qualification</label>
<input id="qualification" required>

<label>Experience</label>
<textarea id="experience"></textarea>

<button type="submit">Submit Application</button>

</form>

</div>

<!-- CREATE ACCOUNT -->

<div id="createModal" class="modal">

<form id="createForm">

<h2>Create Tutor Account</h2>

<label>Email</label>
<input id="accountEmail" required>

<label>Password</label>
<input type="password" required>

<label>Tutor Code</label>
<input id="tutorCode" required>

<button type="submit">Create Account</button>

</form>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyc3T_2QAX2LKbJE4mPPYztVrBj7gE0BCHb9otc4JPkctR_yY6U381B0uX3MYjv_tzoQg/exec";

/* OPEN MODALS */

function openApply(){
document.getElementById("applyModal").style.display="flex";
}

function openCreate(){
document.getElementById("createModal").style.display="flex";
}

/* TUTOR APPLICATION */

document.getElementById("tutorForm").addEventListener("submit",function(e){

e.preventDefault();

const data={
action:"applyTutor",
name:document.getElementById("name").value,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value,
subjects:document.getElementById("subjects").value,
qualification:document.getElementById("qualification").value,
experience:document.getElementById("experience").value
};

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(data=>{
alert("Application submitted successfully");
document.getElementById("tutorForm").reset();
});

});

/* TUTOR CODE VALIDATION */

document.getElementById("createForm").addEventListener("submit",function(e){

e.preventDefault();

const code=document.getElementById("tutorCode").value;

fetch(SCRIPT_URL+"?action=validateCode&code="+code)

.then(res=>res.json())

.then(data=>{

if(data.valid){

alert("Tutor code verified. Account created.");

}else{

alert("Invalid tutor code");

}

});

});

</script>

</body>
</html>
