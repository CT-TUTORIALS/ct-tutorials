<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials | Our Tutors</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
}

/* HEADER */
header {
    background-color: #002147;
    color: white;
    padding: 15px 30px;
    text-align: center;
}

/* NAVIGATION */
nav {
    background-color: #003366;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

nav a {
    color: white;
    padding: 14px 20px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    background-color: #00509e;
}

/* PAGE TITLE */
.page-title {
    text-align: center;
    padding: 30px 10px 10px;
}

.page-title h2 {
    color: #002147;
}

/* GRID */
#tutors-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 30px;
}

/* CARD */
.tutor-card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    padding: 20px;
    text-align: center;
    transition: transform 0.3s ease;
}

.tutor-card:hover {
    transform: translateY(-5px);
}

.tutor-name {
    font-size: 18px;
    font-weight: bold;
    color: #002147;
}

.tutor-subject {
    font-size: 14px;
    color: #666;
    margin: 8px 0;
}

.tutor-bio {
    font-size: 14px;
    margin-bottom: 15px;
}

/* BUTTON */
.book-btn {
    background-color: #003366;
    color: white;
    padding: 10px 15px;
    border-radius: 5px;
    text-decoration: none;
    display: inline-block;
}

.book-btn:hover {
    background-color: #00509e;
}

/* EMPTY STATE */
.empty {
    text-align:center;
    padding:40px;
    color:#777;
    grid-column: 1 / -1;
}

/* FOOTER */
footer {
    text-align: center;
    background-color: #002147;
    color: white;
    padding: 15px;
    margin-top: 30px;
}
</style>
</head>

<body>

<header>
    <h1>C&T Tutorials</h1>
    <p>Meet Our Qualified Tutors</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="tutors.html">Our Tutors</a>
    <a href="booking.html">Book a Session</a>
    <a href="tutor-login.html">Tutor Login</a>
    <a href="contact.html">Contact</a>
</nav>

<section class="page-title">
    <h2>Our Professional Tutors</h2>
    <p>All tutors are verified and approved by C&T Tutorials</p>
</section>

<!-- DYNAMIC TUTOR CARDS -->
<section id="tutors-container">
    <div class="empty">Loading tutors...</div>
</section>

<footer>
    <p>© 2026 C&T Tutorials | Empowering Students for Success</p>
</footer>


<!-- 🔥 FIREBASE + DYNAMIC LOADING -->
<script type="module">

/* 🔌 FIREBASE IMPORTS */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔑 YOUR CONFIG */
const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  authDomain: "YOUR-PROJECT.firebaseapp.com",
  projectId: "YOUR-PROJECT-ID",
  storageBucket: "YOUR-PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

/* 🚀 INITIALIZE */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 📥 LOAD APPROVED TUTORS */
const container = document.getElementById("tutors-container");
container.innerHTML = "";

let hasTutors = false;

const querySnapshot = await getDocs(collection(db, "tutors"));

querySnapshot.forEach((doc) => {
    const t = doc.data();

    /* ✅ ONLY SHOW APPROVED TUTORS */
    if (t.approved === true) {
        hasTutors = true;

        container.innerHTML += `
        <div class="tutor-card">
            <div class="tutor-name">${t.name}</div>
            <div class="tutor-subject">${t.subject}</div>
            <div class="tutor-bio">${t.bio}</div>
            <a href="booking.html?tutor=${encodeURIComponent(t.name)}" class="book-btn">
                Book Session
            </a>
        </div>
        `;
    }
});

/* 🚫 IF NONE APPROVED */
if (!hasTutors) {
    container.innerHTML = `<div class="empty">No tutors available yet. Please check back later.</div>`;
}

</script>

</body>
</html>
