<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutors Portal | C&T Tutorials</title>

<style>

body{
margin:0;
font-family:"Segoe UI",Arial,sans-serif;
background:#f4f4f4;
}

/* HEADER */
header{
background:#003366;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
position:sticky;
top:0;
z-index:999;
}

nav a{
color:white;
margin-left:18px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
text-decoration:underline;
}

/* MAIN */
.main{
max-width:1000px;
margin:auto;
padding:40px;
background:white;
margin-top:30px;
}

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-top:30px;
}

.card{
background:#f7f7f7;
padding:25px;
border-radius:8px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
text-align:center;
}

.card h3{
color:#003366;
}

.card button{
margin-top:10px;
padding:10px 15px;
background:#003366;
color:white;
border:none;
cursor:pointer;
}

/* MODALS */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:white;
padding:25px;
border-radius:8px;
width:90%;
max-width:420px;
}

.modal-content h2{
margin-top:0;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
padding:10px 15px;
background:#003366;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
width:100%;
}

/* FLOATING BUTTON */
.floating-btn{
position:fixed;
bottom:25px;
right:25px;
background:#003366;
color:white;
padding:15px 22px;
border:none;
border-radius:40px;
font-size:16px;
cursor:pointer;
box-shadow:0 4px 6px rgba(0,0,0,0.3);
}

footer{
background:#003366;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<div><strong>C&T Tutorials</strong></div>

<nav>
<a href="index.html">Home</a>
<a href="#" onclick="openModal('createModal')">Create Account</a>
<a href="#" onclick="openModal('loginModal')">Login</a>
</nav>

</header>


<div class="main">

<h2>Welcome Tutors</h2>
<p>Only approved tutors can access the dashboard after logging in.</p>

<div id="dashboard" style="display:none">

<h2>Tutor Dashboard</h2>

<div class="dashboard">

<div class="card">
<h3>Assigned Students</h3>
<button>View</button>
</div>

<div class="card">
<h3>Resources</h3>
<button>Open</button>
</div>

<div class="card">
<h3>Availability</h3>
<button>Update</button>
</div>

<div class="card">
<h3>Messages</h3>
<button>Open</button>
</div>

</div>

</div>

</div>

<button class="floating-btn" onclick="openModal('applyModal')">Apply Now</button>


<!-- CREATE ACCOUNT -->
<div id="createModal" class="modal">
<div class="modal-content">
<h2>Create Tutor Account</h2>
<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button>Create Account</button>
</div>
</div>


<!-- LOGIN -->
<div id="loginModal" class="modal">
<div class="modal-content">
<h2>Tutor Login</h2>
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="unlockDashboard()">Login</button>
</div>
</div>


<!-- APPLY -->
<div id="applyModal" class="modal">
<div class="modal-content">
<h2>Tutor Application</h2>
<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="text" placeholder="Subjects you can tutor">
<button>Submit Application</button>
</div>
</div>


<footer>
© 2026 C&T Tutorials
</footer>


<script>

function openModal(id){
document.getElementById(id).style.display="flex";
}

window.onclick=function(e){
document.querySelectorAll(".modal").forEach(function(modal){
if(e.target===modal){
modal.style.display="none";
}
});
}

function unlockDashboard(){
document.getElementById("loginModal").style.display="none";
document.getElementById("dashboard").style.display="block";
}

</script>

</body>
</html>
