<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutors' Corner | C&T Tutorials</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
}

header{
    background:#003366;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

h2{
    color:#003366;
}

label{
    display:block;
    margin-top:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    font-size:16px;
    cursor:pointer;
}

.back{
    display:block;
    margin-top:15px;
    text-align:center;
}
</style>
</head>

<body>

<header>
<h1>Tutors' Corner</h1>
<p>Apply to become a tutor at C&T Tutorials</p>
</header>

<div class="container">
<h2>Tutor Application Form</h2>

<form id="tutorForm">

<label>Full Name
<input type="text" id="tutorName" required>
</label>

<label>Email
<input type="email" id="tutorEmail" required>
</label>

<label>Phone Number
<input type="tel" id="tutorPhone" required>
</label>

<label>Subject You Offer
<input type="text" id="tutorSubject" placeholder="e.g Academic Writing, English, Research Skills" required>
</label>

<button type="submit">Submit Application</button>

</form>

<a href="index.html" class="back">← Back to Home</a>
</div>

<!-- Firebase Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJIoUss8lPbrVlFzkBcgf3l62tRQgQ9Ng",
  authDomain: "ct-tutorials-web.firebaseapp.com",
  projectId: "ct-tutorials-web",
  storageBucket: "ct-tutorials-web.firebasestorage.app",
  messagingSenderId: "369659340275",
  appId: "1:369659340275:web:b081919e9dea8453241e86"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Handle form submission
document.getElementById("tutorForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    await addDoc(collection(db, "tutors"), {
        name: document.getElementById("tutorName").value,
        email: document.getElementById("tutorEmail").value,
        phone: document.getElementById("tutorPhone").value,
        subject: document.getElementById("tutorSubject").value,
        approved: false
    });

    alert("Application submitted successfully! You will be contacted after approval.");

    e.target.reset();
});
</script>

</body>
</html>
