<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials – Tutor Login</title>
<style>
body{font-family:Arial, sans-serif; background:#f4f4f4; margin:0;}
header, footer{background:#003366; color:white; text-align:center; padding:15px;}
.container{max-width:500px; margin:auto; background:white; padding:30px; margin-top:20px; border-radius:8px;}
input, button{padding:10px; margin-top:10px; width:100%; box-sizing:border-box;}
button{background:#003366; color:white; border:none; cursor:pointer;}
button:hover{background:#00509e;}
p{margin-top:10px;}
.success{color:green;}
.error{color:red;}
</style>
</head>
<body>

<header>
<h1>C&T Tutorials – Tutor Portal</h1>
</header>

<div class="container" id="loginPage">
<h2>Tutor Login</h2>
<input id="accessCode" placeholder="Access Code">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginError" class="error"></p>
<p>New? <button onclick="showRegister()">Register</button></p>
</div>

<div class="container" id="registerPage" style="display:none;">
<h2>Tutor Registration</h2>
<input id="regAccessCode" placeholder="Access Code">
<input id="regPassword" type="password" placeholder="Set Your Password">
<button onclick="register()">Register</button>
<p id="regError" class="error"></p>
<p>Already registered? <button onclick="showLogin()">Back to Login</button></p>
</div>

<div class="container" id="dashboardPage" style="display:none;">
<h2>Welcome, <span id="tutorName"></span></h2>
<p>This is your dashboard. You can see your approved status and subjects.</p>
<ul>
<li><strong>Subjects:</strong> <span id="tutorSubjects"></span></li>
<li><strong>Status:</strong> <span id="tutorStatus"></span></li>
</ul>
<button onclick="logout()">Logout</button>
</div>

<footer>
<p>© 2026 C&T Tutorials | Independent Academic Support Service</p>
</footer>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxsXkwPLpdTK9oiBayEl_-TkN_T2x3SubSrjk-0TIC3eYbwbgD1-coQjNk0PqDmJDd35w/exec";

function showRegister(){
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("registerPage").style.display = "block";
}
function showLogin(){
  document.getElementById("registerPage").style.display = "none";
  document.getElementById("loginPage").style.display = "block";
}

function register(){
  const code = document.getElementById("regAccessCode").value.trim();
  const password = document.getElementById("regPassword").value.trim();
  if(!code || !password){ document.getElementById("regError").innerText="Enter all fields"; return; }

  fetch(SCRIPT_URL,{
    method:"POST",
    body: JSON.stringify({
      type:"createTutorAccount",
      code: code,
      password: password
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="account_created"){
      document.getElementById("regError").innerText="";
      alert("Registration successful! Use your password to login.");
      showLogin();
    } else {
      document.getElementById("regError").innerText="Invalid Access Code";
    }
  });
}

function login(){
  const code = document.getElementById("accessCode").value.trim();
  const password = document.getElementById("password").value.trim();
  if(!code || !password){ document.getElementById("loginError").innerText="Enter all fields"; return; }

  fetch(SCRIPT_URL+"?action=getAllTutors")
  .then(res=>res.json())
  .then(tutors=>{
    const tutor = tutors.find(t=>t.accessCode===code && t.password===password);
    if(tutor){
      document.getElementById("loginPage").style.display="none";
      document.getElementById("dashboardPage").style.display="block";
      document.getElementById("tutorName").innerText = tutor.name;
      document.getElementById("tutorSubjects").innerText = tutor.subjects;
      document.getElementById("tutorStatus").innerText = tutor.status;
    } else {
      document.getElementById("loginError").innerText="Invalid Access Code or Password";
    }
  });
}

function logout(){
  document.getElementById("dashboardPage").style.display="none";
  document.getElementById("loginPage").style.display="block";
  document.getElementById("accessCode").value="";
  document.getElementById("password").value="";
  document.getElementById("loginError").innerText="";
}
</script>

</body>
</html>
