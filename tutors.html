<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials Tutors Portal</title>

<style>
body{margin:0;font-family:"Segoe UI", Arial, sans-serif;background:#f4f4f4;color:#333;line-height:1.6;}
header{background:#003366;height:100px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;}
nav{display:flex;justify-content:center;gap:15px;width:100%;}
nav a{color:white;text-decoration:none;font-weight:bold;cursor:pointer;}
nav a:hover{text-decoration:underline;}
.main-content{max-width:1100px;margin:auto;padding:50px 40px;background:white;}
h2{color:#003366;border-bottom:2px solid #003366;padding-bottom:8px;margin-bottom:25px;}
.tutor-card{border:1px solid #ddd;padding:20px;border-radius:8px;margin-bottom:20px;}
.tutor-card h3{margin:0 0 10px 0;color:#00509e;}
.tutor-card p{margin:4px 0;}
footer{background:#003366;color:white;text-align:center;padding:25px;}
.footer-disclaimer{font-size:12px;max-width:900px;margin:auto;line-height:1.6;}
</style>
</head>
<body>

<header>
<nav>
<a href="index.html#about">Home</a>
<a href="index.html#services">Apply</a>
<a href="index.html#resources">Resources</a>
<a href="index.html#contact">Contact</a>
<a href="#" onclick="logoutTutor()">Logout</a>
</nav>
</header>

<div class="main-content">
<section id="tutorsSection">
<h2>Approved Tutors</h2>
<div id="tutorsList"><p>Loading tutors...</p></div>
</section>
</div>

<footer>
<div class="footer-disclaimer">
<strong>Disclaimer:</strong><br>
C&T Tutorials operates independently and is not affiliated with any university or academic institution.
</div>
</footer>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxsXkwPLpdTK9oiBayEl_-TkN_T2x3SubSrjk-0TIC3eYbwbgD1-coQjNk0PqDmJDd35w/exec";

/* Load tutors - only approved ones */
function loadTutors(){
  fetch(SCRIPT_URL+"?action=getApprovedTutors")
    .then(res=>res.json())
    .then(tutors=>{
      const container=document.getElementById("tutorsList");
      container.innerHTML="";
      if(tutors.length===0){container.innerHTML="<p>No approved tutors at the moment.</p>";return;}
      tutors.forEach(t=>{
        const card=document.createElement("div");
        card.className="tutor-card";
        card.innerHTML=`
          <h3>${t.name}</h3>
          <p><strong>Email:</strong> ${t.email}</p>
          <p><strong>Phone:</strong> ${t.phone}</p>
          <p><strong>Subjects:</strong> ${t.subjects}</p>
          <p><strong>Qualification:</strong> ${t.qualification}</p>
          <p><strong>Experience:</strong> ${t.experience}</p>
        `;
        container.appendChild(card);
      });
    });
}

/* Tutor Logout */
function logoutTutor(){
  alert("You have been logged out.");
  window.location.href="index.html";
}

// Check tutor session on page load
window.onload=function(){
  const loggedIn=localStorage.getItem("tutorLoggedIn");
  if(!loggedIn){window.location.href="index.html";}
  else{loadTutors();}
}
</script>

</body>
</html>
