<!DOCTYPE html>
<html lang="en">
<head>

<title>Tutor Application - C&T Tutorials</title>

<style>
body { 
    margin:0; 
    font-family: Arial, sans-serif; 
    background:#f4f4f4; 
}

/* ===== HEADER (Matched to Tutors' Corner Color) ===== */
header { 
    background:#008080; 
    color:white; 
    padding:20px 0; 
    text-align:center;
    position:relative;
}

header h1{
    margin:0;
    font-size:26px;
    letter-spacing:1px;
}

/* Back to Home Link */
.home-link{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    color:white;
    text-decoration:none;
    font-size:15px;
}

.home-link:hover{
    text-decoration:underline;
}

/* ===== MAIN SECTION ===== */
section{
    padding:80px 20px;
    text-align:center;
}

section h2{
    color:#006666;
    font-size:30px;
    margin-bottom:20px;
}

section p{
    max-width:650px;
    margin:0 auto 30px auto;
    font-size:18px;
    color:#333;
    line-height:1.6;
}

/* ===== BUTTON ===== */
.apply-btn{
    display:inline-block;
    padding:18px 35px;
    background:#008080;
    color:white;
    text-decoration:none;
    font-size:18px;
    border-radius:8px;
    transition:0.3s ease;
}

.apply-btn:hover{
    background:#006666;
}

/* ===== FOOTER ===== */
footer { 
    background:#008080; 
    color:white; 
    text-align:center; 
    padding:25px 20px; 
    margin-top:80px;
    font-size:14px;
}
</style>
