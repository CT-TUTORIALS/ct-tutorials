<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6fZNU0Tx42fTIoh0W8iZgHbQ-hWuqCvXFPZhmVlZEU2tKYpn1CEQjt0UKBLwGGN7qnQ/exec";

document.getElementById("tutorForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const formData = new FormData(this);
  const data = {};
  formData.forEach((value, key) => data[key] = value);

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(response => response.json())
  .then(res => {
    alert("Application submitted successfully!");
    this.reset();
  })
  .catch(err => alert("Error submitting application."));
});
</script>

</body>
