<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor Application - C&T Tutorials</title>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }
header { background:#003366; color:white; padding:15px; text-align:center; }
form { background:white; max-width:500px; margin:30px auto; padding:20px; border-radius:10px; }
label { display:block; margin-top:12px; }
input { width:100%; padding:10px; margin-top:5px; }
canvas { border:1px solid #ccc; margin-top:5px; border-radius:5px; }
button { margin-top:15px; padding:12px; width:100%; background:#003366; color:white; border:none; border-radius:5px; cursor:pointer; }
button:hover { background:#00509e; }
footer { background:#003366; color:white; text-align:center; padding:20px; margin-top:40px; }
</style>
</head>
<body>

<header>
<h1>C&T Tutorials - Tutor Application</h1>
</header>

<form id="tutorForm">

<label>Full Name
<input type="text" id="name" required>
</label>

<label>Email
<input type="email" id="email" required>
</label>

<label>Cell Number
<input type="tel" id="cell_number" required>
</label>

<label>Subject Expertise
<input type="text" id="subject" required>
</label>

<label>Upload CV (PDF only)
<input type="file" id="cv" accept=".pdf">
</label>

<label>
<input type="checkbox" required>
I agree to the 
<a href="tutor-disclosure.html" target="_blank">
Tutor Disclosure Agreement
</a>
</label>

<label>Digital Signature</label>
<canvas id="signaturePad" width="400" height="150"></canvas>
<button type="button" id="clearSignature">Clear Signature</button>

<button type="submit">Submit Application</button>

</form>

<footer>
© 2026 C&T Tutorials
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_STORAGE_BUCKET",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// Signature Pad
const canvas = document.getElementById("signaturePad");
const ctx = canvas.getContext("2d");
let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => { drawing = false; ctx.beginPath(); });
canvas.addEventListener("mousemove", e => {
if(!drawing) return;
ctx.lineWidth = 2;
ctx.lineCap = "round";
ctx.strokeStyle = "#000";
ctx.lineTo(e.offsetX, e.offsetY);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(e.offsetX, e.offsetY);
});

document.getElementById("clearSignature").onclick = () => {
ctx.clearRect(0,0,canvas.width,canvas.height);
};

document.getElementById("tutorForm").addEventListener("submit", async e => {
e.preventDefault();

const name = name.value;
const email = email.value;
const cell_number = cell_number.value;
const subject = subject.value;
const cvFile = document.getElementById("cv").files[0];

let cvURL="";
if(cvFile){
const cvRef = ref(storage, "tutor_cvs/"+Date.now()+"_"+cvFile.name);
await uploadBytes(cvRef, cvFile);
cvURL = await getDownloadURL(cvRef);
}

const signatureData = canvas.toDataURL();
const sigRef = ref(storage, "tutor_signatures/"+Date.now()+"_sig.png");
await uploadBytes(sigRef, await (await fetch(signatureData)).blob());
const signatureURL = await getDownloadURL(sigRef);

await addDoc(collection(db,"tutors"),{
name,email,cell_number,subject,
cvURL,
signatureURL,
approved:false,
agreedToDisclosure:true,
agreementTimestamp:new Date(),
createdAt:new Date()
});

alert("Application submitted successfully.");
e.target.reset();
ctx.clearRect(0,0,canvas.width,canvas.height);
});
</script>

</body>
</html>
