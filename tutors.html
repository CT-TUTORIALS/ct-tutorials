<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutors Portal | C&T Tutorials</title>

<style>
body{
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f4f4f4;
  margin:0;
  padding:0;
}

.container{
  max-width:500px;
  margin:50px auto;
  background:white;
  padding:25px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

label{
  display:block;
  margin-top:15px;
  font-weight:500;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:5px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

textarea{
  min-height:80px;
  resize:vertical;
}

button{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#003366;
  color:white;
  border:none;
  border-radius:5px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#00509e;
}
</style>
</head>

<body>

<div class="container">

<h2>Tutor Application</h2>

<form id="tutorForm">

<label>Full Name
<input type="text" name="name" required>
</label>

<label>Email
<input type="email" name="email" required>
</label>

<label>Cellphone Number
<input type="tel" name="phone" required>
</label>

<label>Area of Expertise / Subjects
<input type="text" name="subjects" required>
</label>

<label>Highest Qualification
<input type="text" name="qualification" required>
</label>

<label>Brief Teaching or Academic Experience
<textarea name="experience" required></textarea>
</label>

<button type="submit">Submit Application</button>

</form>

</div>

<script>
/* --- Send tutor data to Google Apps Script --- */

const scriptURL = "https://script.google.com/macros/s/AKfycbzMCx7JDK0f1US6G9hLq2Ag1u_jQPiABcCPk0gzd6B3cKSERg-pHfZ0DpchZoqyQFHaQg/exec";

document.getElementById("tutorForm").addEventListener("submit", function(e){
  e.preventDefault();

  fetch(scriptURL, {
    method: "POST",
    body: new FormData(this)
  })
  .then(response => response.json())
  .then(data => {
    alert("Application submitted successfully! Admins will review and approve.");
    document.getElementById("tutorForm").reset();
  })
  .catch(error => alert("Error submitting application. Please try again."));
});
</script>

</body>
</html>
