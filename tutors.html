<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutors' Corner - C&T Tutorials</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
}

form{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
background:#002147;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Tutors' Corner</h2>
<p>Register to offer your tutoring services</p>

<form id="tutorForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<input type="text" id="subject" placeholder="Subject Specialization" required>
<input type="text" id="phone" placeholder="Phone Number" required>
<textarea id="bio" placeholder="Short Bio"></textarea>

<button type="submit">Create Tutor Account</button>
</form>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAJIoUss8lPbrVlFzkBcgf3l62tRQgQ9Ng",
authDomain: "ct-tutorials-web.firebaseapp.com",
projectId: "ct-tutorials-web",
storageBucket: "ct-tutorials-web.firebasestorage.app",
messagingSenderId: "369659340275",
appId: "1:369659340275:web:b081919e9dea8453241e86"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("tutorForm").addEventListener("submit", async(e)=>{
e.preventDefault();

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const subject = document.getElementById("subject").value;
const phone = document.getElementById("phone").value;
const bio = document.getElementById("bio").value;

const user = await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"tutors",user.user.uid),{
name,email,subject,phone,bio,createdAt:new Date()
});

alert("Tutor account created successfully!");
document.getElementById("tutorForm").reset();
});

</script>

</body>
</html>
