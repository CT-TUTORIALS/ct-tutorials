<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutors</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <nav>
    <a href="index.html">Home</a>
    <a href="#tutors-section">Tutors</a>
    <a href="#contact">Contact</a>
  </nav>
</div>

<section id="tutors-section" class="main-content">
  <h2>Our Tutors</h2>
  <div id="tutorsGrid" class="services-grid"></div>
</section>

<script>
const STUDENT_SCRIPT_URL = "https://script.google.com/macros/s/.../exec";

function fetchTutors() {
  fetch(`${STUDENT_SCRIPT_URL}?action=getTutors`)
    .then(res => res.json())
    .then(tutors => {
      const grid = document.getElementById("tutorsGrid");
      tutors.forEach(t => {
        const card = document.createElement("div");
        card.className = "service-card";
        card.innerHTML = `<h3>${t.name}</h3><p>Subject: ${t.subject}</p>`;
        grid.appendChild(card);
      });
    });
}

fetchTutors();
</script>

</body>
</html>
