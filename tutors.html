<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor Application | C&T Tutorials</title>

<style>
/* --- Base Styles --- */
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
  line-height: 1.5;
}

header {
  background: #003366;
  color: white;
  padding: 20px 10px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 1.8rem;
}

header p {
  margin: 5px 0 0 0;
  font-size: 1rem;
}

.container {
  width: 90%;
  max-width: 500px;
  margin: 30px auto;
  background: white;
  padding: 30px 25px;
  border-radius: 8px;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

h2 {
  color: #003366;
  margin-top: 0;
  font-size: 1.6rem;
}

p {
  margin-top: 10px;
}

/* --- Form Styles --- */
label {
  display: block;
  margin-top: 15px;
  font-weight: bold;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  font-size: 1rem;
}

textarea {
  min-height: 100px;
  resize: vertical;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: #003366;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1.1rem;
  transition: background 0.3s ease;
}

button:hover {
  background: #00509e;
}

.success {
  color: green;
  margin-top: 20px;
  font-weight: bold;
}

/* --- Footer --- */
footer {
  text-align: center;
  margin-top: 40px;
  padding: 20px 10px;
  background: #003366;
  color: white;
}

/* --- Responsive Adjustments --- */
@media (max-width: 600px) {
  .container {
    padding: 25px 15px;
  }

  header h1 {
    font-size: 1.5rem;
  }

  header p {
    font-size: 0.9rem;
  }

  button {
    font-size: 1rem;
    padding: 12px;
  }

  input, textarea {
    font-size: 0.95rem;
    padding: 10px;
  }
}
</style>
</head>

<body>

<header>
  <h1>C&T Tutorials</h1>
  <p>Apply to Become a Tutor</p>
</header>

<div class="container">

<h2>Tutor Application</h2>

<p>
Thank you for your interest in joining <strong>C&T Tutorials</strong>. 
Please complete the form below. Approved tutors will receive a secure tutor code
to create a tutor account and access the tutor dashboard.
</p>

<form id="tutorForm">

<label>Full Name
<input type="text" name="name" id="name" placeholder="Your full name" required>
</label>

<label>Email Address
<input type="email" name="email" id="email" placeholder="you@example.com" required>
</label>

<label>Cellphone Number
<input type="tel" name="phone" id="phone" placeholder="+264 81 234 5678" required>
</label>

<label>Subjects You Can Tutor
<input type="text" name="subjects" id="subjects" placeholder="Example: Mathematics, Physics" required>
</label>

<label>Highest Qualification
<input type="text" name="qualification" id="qualification" placeholder="Example: BSc Mathematics" required>
</label>

<label>Brief Teaching or Academic Experience
<textarea name="experience" id="experience" placeholder="Briefly describe your experience" required></textarea>
</label>

<button type="submit">Submit Application</button>

</form>

<p id="message" class="success"></p>

</div>

<footer>
<p>© 2026 C&T Tutorials</p>
</footer>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyc3T_2QAX2LKbJE4mPPYztVrBj7gE0BCHb9otc4JPkctR_yY6U381B0uX3MYjv_tzoQg/exec";

document.getElementById("tutorForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    action: "applyTutor",
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    subjects: document.getElementById("subjects").value,
    qualification: document.getElementById("qualification").value,
    experience: document.getElementById("experience").value
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(response => {
    document.getElementById("message").innerText = 
      "Application submitted successfully. You will receive an email if approved.";
    document.getElementById("tutorForm").reset();
  })
  .catch(error => {
    alert("Error submitting application. Please try again.");
    console.error(error);
  });
});
</script>

</body>
</html>
