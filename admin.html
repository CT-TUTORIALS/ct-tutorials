<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials | Admin Dashboard</title>
<style>
body{margin:0;font-family:Segoe UI, Arial;background:#f4f4f4;}
header{background:#003366;color:white;padding:15px;text-align:center;display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
header a{color:white;font-weight:bold;text-decoration:none;cursor:pointer;}
header a:hover{text-decoration:underline;}
.main{max-width:1200px;margin:auto;padding:40px;background:white;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ddd;padding:10px;text-align:left;}
th{background:#003366;color:white;}
button{padding:6px 10px;border:none;border-radius:4px;cursor:pointer;}
button.approve{background:#007700;color:white;}
button.reject{background:#990000;color:white;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:1000;}
.modal form{background:white;padding:25px;width:90%;max-width:400px;border-radius:10px;position:relative;}
.close{position:absolute;top:10px;right:15px;font-size:22px;cursor:pointer;background:none;border:none;}
</style>
</head>
<body>

<header>
<a onclick="requireLogin('tutors')">Tutors' List</a>
<a onclick="requireLogin('students')">Students' List</a>
<a onclick="openLogin()">Admin Login</a>
</header>

<div class="main">
<h2>Dashboard</h2>
<div id="contentArea">
<p>Select an option above.</p>
</div>
</div>

<div class="modal" id="loginModal">
<form>
<button type="button" class="close" onclick="closeLogin()">×</button>
<h3>Admin Login</h3>
<label>Username<input type="text" id="adminUsername" required></label>
<label>Password<input type="password" id="adminPassword" required></label>
<button type="submit" class="submit-btn">Login</button>
</form>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyprzZlwHhWkoAA8suvmTU0_alu22iJOf5SEcFmen1Efh-WMjBIoA67gzxMvZobMNh9HQ/exec";
const ADMIN_USERNAME="admin";
const ADMIN_PASSWORD="3545Sh@kes";
let loggedIn=false;

function openLogin(){loginModal.style.display='flex';}
function closeLogin(){loginModal.style.display='none';}

document.querySelector("#loginModal form").addEventListener("submit",function(e){
e.preventDefault();
if(document.getElementById("adminUsername").value===ADMIN_USERNAME &&
document.getElementById("adminPassword").value===ADMIN_PASSWORD){
loggedIn=true;
localStorage.setItem("adminLoggedIn","true");
closeLogin();
alert("Login successful!");} else {alert("Invalid credentials");}});

window.onload=function(){if(localStorage.getItem("adminLoggedIn")==="true"){loggedIn=true;}};

function requireLogin(type){
if(!loggedIn){openLogin();return;}
const contentArea=document.getElementById("contentArea");
contentArea.innerHTML="";
if(type==="tutors"){
fetch(SCRIPT_URL+"?action=getTutorApplications").then(r=>r.json()).then(data=>{
let html=`<h3>Tutor Applications</h3><table><tr><th>Full Name</th><th>Email</th><th>Phone</th><th>Subjects</th><th>Qualification</th><th>Experience</th><th>Timestamp</th><th>Status</th><th>AccessCode</th><th>Action</th></tr>`;
data.forEach((t,i)=>{
html+=`<tr>
<td>${t.name}</td><td>${t.email}</td><td>${t.phone}</td><td>${t.subjects}</td><td>${t.qualification}</td><td>${t.experience}</td><td>${t.timestamp}</td><td>${t.status}</td>
<td>${t.accessCode}</td>
<td><button onclick="approveTutor(${i})">Approve</button><button onclick="rejectTutor(${i})">Reject</button></td>
</tr>`;});
html+="</table>";
contentArea.innerHTML=html;});}
else if(type==="students"){
fetch(SCRIPT_URL+"?action=getStudents").then(r=>r.json()).then(data=>{
let html=`<h3>Registered Students</h3><table><tr><th>Name</th><th>Email</th><th>Cell Number</th><th>Service</th><th>Tutor</th></tr>`;
data.forEach(s=>{html+=`<tr><td>${s.name}</td><td>${s.email}</td><td>${s.cell_number}</td><td>${s.service}</td><td>${s.tutor}</td></tr>`;});
html+="</table>";
contentArea.innerHTML=html;});}
}

function approveTutor(index){
fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({type:"approveTutor",index:index})}).then(r=>r.json()).then(()=>requireLogin('tutors'));
}

function rejectTutor(index){
fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({type:"rejectTutor",index:index})}).then(r=>r.json()).then(()=>requireLogin('tutors'));
}
</script>

</body>
</html>
