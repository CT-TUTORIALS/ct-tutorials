<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials | Admins Portal</title>

<style>
body{margin:0;font-family:Segoe UI, Arial;background:#f4f4f4;}
header{background:#003366;color:white;padding:20px;text-align:center;}
nav a{color:white;margin:0 15px;text-decoration:none;font-weight:bold;cursor:pointer;}
.main{max-width:1000px;margin:auto;background:white;padding:40px;min-height:calc(100vh - 160px);}
h2{color:#003366;}
table{width:100%;border-collapse:collapse;margin-bottom:20px;}
th,td{border:1px solid #ddd;padding:8px;text-align:left;}
th{background:#003366;color:white;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
.modal form{background:white;padding:25px;width:90%;max-width:500px;border-radius:10px;position:relative;}
.close{position:absolute;right:15px;top:10px;font-size:22px;cursor:pointer;border:none;background:none;}
label{display:block;margin-top:12px;font-weight:500;}
input{width:100%;padding:10px;margin-top:5px;border-radius:5px;border:1px solid #ccc;box-sizing:border-box;}
button{background:#003366;color:white;border:none;padding:10px;cursor:pointer;width:100%;border-radius:5px;}
footer{background:#003366;color:white;text-align:center;padding:25px;position:relative;bottom:0;width:100%;}
</style>

</head>
<body>

<header>
<h1>Admins Portal</h1>
<nav>
<a href="index.html">Home</a>
<a onclick="loadTutorApplications()">Tutors' List</a>
<a onclick="loadStudentRegistrations()">Students' List</a>
</nav>
</header>

<div class="main">
<div id="content">
<!-- Populated after admin login -->
</div>
</div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
<form>
<button type="button" class="close" onclick="closeLogin()">×</button>
<h3>Admin Login</h3>
<label>Username
<input type="text" id="adminUser" required>
</label>
<label>Password
<input type="password" id="adminPass" required>
</label>
<button type="submit" onclick="adminLogin(event)">Login</button>
</form>
</div>

<footer>
<strong>Disclaimer:</strong> Admins must handle all tutor and student data responsibly and follow all guidelines as outlined in C&T Tutorials Disclosure Agreement.
</footer>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyprzZlwHhWkoAA8suvmTU0_alu22iJOf5SEcFmen1Efh-WMjBIoA67gzxMvZobMNh9HQ/exec";

/* MODAL */
function openLogin(){document.getElementById("loginModal").style.display="flex";}
function closeLogin(){document.getElementById("loginModal").style.display="none";}

/* ADMIN CREDENTIALS */
const admins = [
  {user:"admin1",pass:"3545Sh@kes"},
  {user:"admin2",pass:"Partner2Pass"},
  {user:"admin3",pass:"Partner3Pass"}
];
let adminLoggedIn=false;

function adminLogin(e){
  e.preventDefault();
  const u=document.getElementById("adminUser").value;
  const p=document.getElementById("adminPass").value;
  if(admins.some(a=>a.user===u && a.pass===p)){
    adminLoggedIn=true;closeLogin();alert("Login successful!");
  } else{alert("Invalid credentials");}
}

/* FETCH TUTOR APPLICATIONS */
function loadTutorApplications(){
  if(!adminLoggedIn){openLogin(); return;}
  fetch(SCRIPT_URL+"?action=getTutorApplications")
    .then(r=>r.json())
    .then(data=>{
      let html="<h3>Tutor Applications</h3><table><tr><th>Full Name</th><th>Email</th><th>Phone</th><th>Subjects</th><th>Qualification</th><th>Experience</th><th>Status</th></tr>";
      data.forEach(d=>{html+=`<tr><td>${d.name}</td><td>${d.email}</td><td>${d.phone}</td><td>${d.subjects}</td><td>${d.qualification}</td><td>${d.experience}</td><td>${d.status}</td></tr>`;});
      html+="</table>";
      document.getElementById("content").innerHTML=html;
    });
}

/* FETCH STUDENT REGISTRATIONS */
function loadStudentRegistrations(){
  if(!adminLoggedIn){openLogin(); return;}
  fetch(SCRIPT_URL+"?action=getStudentRegistrations")
    .then(r=>r.json())
    .then(data=>{
      let html="<h3>Registered Students</h3><table><tr><th>Full Name</th><th>Email</th><th>Cell Number</th><th>Service</th><th>Tutor</th></tr>";
      data.forEach(d=>{html+=`<tr><td>${d.name}</td><td>${d.email}</td><td>${d.cell_number}</td><td>${d.service}</td><td>${d.tutor}</td></tr>`;});
      html+="</table>";
      document.getElementById("content").innerHTML=html;
    });
}
</script>
</body>
</html>
