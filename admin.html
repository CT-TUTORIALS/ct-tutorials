<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials | Admin Dashboard</title>

<style>
body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:#f4f4f4;color:#333;}
header{background:#003366;color:white;padding:20px;text-align:center;}
h2{color:#003366;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ccc;padding:8px;text-align:left;}
th{background:#003366;color:white;}
button.approve{background:#28a745;color:white;border:none;padding:6px 12px;border-radius:5px;cursor:pointer;margin-right:5px;}
button.reject{background:#dc3545;color:white;border:none;padding:6px 12px;border-radius:5px;cursor:pointer;}
button.approve:hover{opacity:0.8;}
button.reject:hover{opacity:0.8;}
footer{background:#003366;color:white;text-align:center;padding:25px;margin-top:40px;}
</style>
</head>
<body>

<header>
<h1>C&T Tutorials Admin Dashboard</h1>
<p>Manage tutor applications efficiently</p>
<button onclick="logout()" style="float:right;margin-top:-40px;padding:8px 16px;border:none;border-radius:5px;background:#00509e;color:white;cursor:pointer;">Logout</button>
</header>

<main style="max-width:1100px;margin:30px auto;padding:0 20px;">
<h2>Tutor Applications</h2>
<table id="adminTable">
<thead>
<tr>
<th>Name</th><th>Email</th><th>Phone</th><th>Subjects</th><th>Qualification</th><th>Experience</th><th>Status</th><th>Actions</th>
</tr>
</thead>
<tbody>
<tr><td colspan="8">Loading...</td></tr>
</tbody>
</table>
</main>

<footer>
C&T Tutorials Admin Dashboard
</footer>

<script>
const ADMIN_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbcrO4DEvMFHoRNF2hTf134in0pImfBPGj-j6hXMety_sUwiz-liYeIfujAQ4s8-G_eQ/exec";

// Check login on page load
if(!sessionStorage.getItem("adminLoggedIn")){
  const user = prompt("Enter admin username");
  const pass = prompt("Enter admin password");
  fetch(ADMIN_SCRIPT_URL,{
    method:"POST",
    body: JSON.stringify({type:"adminLogin", user:user, pass:pass})
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.success){
      sessionStorage.setItem("adminLoggedIn","true");
      loadAdminTutors();
    } else {
      alert("Invalid credentials. Redirecting to homepage.");
      window.location.href="index.html";
    }
  });
} else {
  loadAdminTutors();
}

// Load tutor applications
function loadAdminTutors(){
  fetch(ADMIN_SCRIPT_URL+"?action=getAllTutors")
    .then(r=>r.json())
    .then(tutors=>{
      const tbody=document.querySelector("#adminTable tbody");
      if(tutors.length===0){tbody.innerHTML='<tr><td colspan="8">No tutors found</td></tr>';return;}
      tbody.innerHTML="";
      tutors.forEach((t,i)=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`
          <td>${t.name}</td>
          <td>${t.email}</td>
          <td>${t.phone}</td>
          <td>${t.subjects}</td>
          <td>${t.qualification}</td>
          <td>${t.experience}</td>
          <td>${t.status}</td>
          <td>
          ${t.status!=="Approved"?`<button class="approve" onclick="updateTutorStatus(${i},'Approved')">Approve</button>`:""}
          ${t.status!=="Rejected"?`<button class="reject" onclick="updateTutorStatus(${i},'Rejected')">Reject</button>`:""}
          </td>`;
        tbody.appendChild(tr);
      });
    });
}

// Update tutor status
function updateTutorStatus(index,status){
  if(!confirm(`Are you sure you want to ${status} this tutor?`)) return;
  fetch(ADMIN_SCRIPT_URL,{
    method:"POST",
    body: JSON.stringify({type:"updateStatus", index:index, status:status})
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.status==="success"){
      alert(`Tutor ${status} successfully.`);
      loadAdminTutors();
    } else {
      alert("Error updating status.");
    }
  });
}

// Logout
function logout(){
  sessionStorage.removeItem("adminLoggedIn");
  window.location.href="index.html";
}
</script>

</body>
</html>
