<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>C&T Tutorials Admin Portal</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.main{
max-width:1000px;
margin:auto;
background:white;
padding:40px;
}

button{
padding:8px 12px;
border:none;
background:#003366;
color:white;
cursor:pointer;
}

.approve{background:#2e7d32}
.logout{background:#990000;margin-top:20px}

.tutor-card{
border:1px solid #ddd;
padding:15px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h1>Admin Dashboard</h1>
<a href="index.html" style="color:white">Home</a>
</header>

<div class="main">

<div id="loginSection">

<h2>Admin Login</h2>

<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">

<button onclick="adminLogin()">Login</button>

</div>

<div id="dashboard" style="display:none">

<h2>Tutor Applications</h2>

<div id="tutorList">Loading...</div>

<button class="logout" onclick="logoutAdmin()">Logout</button>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwbcrO4DEvMFHoRNF2hTf134in0pImfBPGj-j6hXMety_sUwiz-liYeIfujAQ4s8-G_eQ/exec"

window.onload=function(){

if(localStorage.getItem("adminLoggedIn")){

loginSection.style.display="none"
dashboard.style.display="block"

loadTutors()

}

}

function adminLogin(){

const user=document.getElementById("adminUser").value
const pass=document.getElementById("adminPass").value

if(user==="admin" && pass==="3545Sh@kes"){

localStorage.setItem("adminLoggedIn","true")

loginSection.style.display="none"
dashboard.style.display="block"

loadTutors()

}else{

alert("Invalid admin credentials")

}

}

function loadTutors(){

fetch(SCRIPT_URL+"?action=getTutorApplications")

.then(r=>r.json())
.then(tutors=>{

let html=""

tutors.forEach(t=>{

html+=`
<div class="tutor-card">
<b>${t.name}</b><br>
${t.email}<br>
Subjects: ${t.subjects}<br>
<button class="approve" onclick="approveTutor('${t.email}')">Approve</button>
</div>
`

})

tutorList.innerHTML=html

})

}

function approveTutor(email){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"approveTutor",
email:email
})
})
.then(()=>loadTutors())

}

function logoutAdmin(){

localStorage.removeItem("adminLoggedIn")

location.reload()

}

</script>

</body>
</html>
