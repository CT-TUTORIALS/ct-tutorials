<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials | Admin Panel</title>

<style>

body{
font-family:"Segoe UI",Arial;
margin:0;
background:#f4f4f4;
padding-bottom:60px;
}

/* HEADER */

.admin-header{
background:#003366;
color:white;
padding:12px 10px;
position:sticky;
top:0;
z-index:1000;
}

.admin-nav{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
align-items:center;
text-align:center;
}

.admin-nav a{
color:white;
text-decoration:none;
font-weight:bold;
font-size:14px;
}

.signout{
background:#c62828;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
display:inline-block;
}

/* CONTENT */

.container{
max-width:1200px;
margin:auto;
padding:40px 25px;
display:none;
}

h2{
color:#003366;
border-bottom:2px solid #003366;
padding-bottom:6px;
}

section{
margin-bottom:70px;
}

/* TABLES */

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:10px;
border:1px solid #ddd;
font-size:14px;
}

th{
background:#003366;
color:white;
}

button{
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

.approve{background:#2e7d32;color:white;}
.reject{background:#c62828;color:white;}

/* LOGIN */

.login-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:30px;
width:320px;
border-radius:8px;
text-align:center;
}

.login-box input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:4px;
}

.login-btn{
background:#003366;
color:white;
width:100%;
padding:10px;
margin-top:10px;
}

.error{
color:red;
display:none;
font-size:13px;
}

/* LOADING MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:2000;
}

.spinner{
width:40px;
height:40px;
border:4px solid #ccc;
border-top:4px solid #003366;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#003366;
color:white;
text-align:center;
padding:12px 10px;
font-size:14px;
z-index:1000;
}

</style>
</head>

<body>

<div class="login-overlay" id="loginOverlay">

<div class="login-box">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button class="login-btn" onclick="adminLogin()">Login</button>

<p id="error" class="error">Invalid credentials</p>

</div>
</div>

<div class="admin-header">
<div class="admin-nav">
<a href="index.html">Home</a>
<span id="adminLinks" style="display:none;">
<a href="#applications">Applications</a>
<a href="#approved">Approved Tutors</a>
<a href="#students">Students</a>
<a href="#" class="signout" onclick="logout()">Sign Out</a>
</span>
</div>
</div>

<div class="container" id="adminContent">

<section id="applications">
<h2>Tutor Applications</h2>
<table id="applicationsTable">
<thead><tr>
<th>Name</th><th>Email</th><th>Phone</th><th>Subjects</th><th>Status</th><th>Action</th>
</tr></thead>
<tbody></tbody>
</table>
</section>

<section id="approved">
<h2>Approved Tutors</h2>
<table id="approvedTable">
<thead><tr>
<th>Name</th><th>Email</th><th>Phone</th><th>Subjects</th>
</tr></thead>
<tbody></tbody>
</table>
</section>

<section id="students">
<h2>Students</h2>
<table id="studentsTable">
<thead><tr>
<th>Name</th><th>Email</th><th>Phone</th><th>Service</th><th>Tutor</th>
</tr></thead>
<tbody></tbody>
</table>
</section>

</div>

<div class="footer">
© 2026 C&T Tutorials | Admin Panel • All Rights Reserved
</div>

<!-- LOADING MODAL -->
<div class="modal" id="loadingModal">
<div style="background:white;padding:30px;border-radius:8px;text-align:center;">
<div class="spinner"></div>
<p>Processing...</p>
</div>
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxIShwbw27ViNIHCShqkhJv4WaQ0igIE9AQ44FGT9RL1ik4rqeOzi01liVl4vjCFhNqQw/exec";

/* ===== LOGIN ===== */

function adminLogin(){

const username=document.getElementById("username").value.trim()
const password=document.getElementById("password").value.trim()

loadingModal.style.display="flex"

fetch(SCRIPT_URL+"?action=adminLogin&username="+encodeURIComponent(username)+"&password="+encodeURIComponent(password))
.then(r=>r.json())
.then(res=>{

if(res.success){

localStorage.setItem("adminToken",res.token)

initAdmin(res.token)

loadingModal.style.display="none"

}else{
loadingModal.style.display="none"
document.getElementById("error").style.display="block"
}

})
.catch(()=>{
loadingModal.style.display="none"
alert("Network error")
})

}

/* AUTO LOGIN */

window.onload=function(){

const token=localStorage.getItem("adminToken")

if(token){
initAdmin(token)
}

}

/* INIT */

function initAdmin(token){

document.getElementById("loginOverlay").style.display="none"
document.getElementById("adminContent").style.display="block"
document.getElementById("adminLinks").style.display="inline"

loadApplications(token)
loadApprovedTutors(token)
loadStudents(token)

}

/* ===== LOAD DATA ===== */

function handleAuthError(data){
if(data && data.error==="Unauthorized"){
alert("Session expired. Please login again.");
logout();
return true;
}
return false;
}

function loadApplications(token){

fetch(SCRIPT_URL+"?action=getTutorApplications&token="+token)
.then(r=>r.json())
.then(data=>{

if(handleAuthError(data)) return;

const tbody=document.querySelector("#applicationsTable tbody")
tbody.innerHTML=""

if(!Array.isArray(data)) return

data.forEach(app=>{

const row=`
<tr>
<td>${app.name||""}</td>
<td>${app.email||""}</td>
<td>${app.phone||""}</td>
<td>${app.subjects||""}</td>
<td>${app.status||"Pending"}</td>
<td>
<button class="approve" onclick="approve('${app.email}')">Approve</button>
<button class="reject" onclick="reject('${app.email}')">Reject</button>
</td>
</tr>`

tbody.innerHTML+=row

})

})

}

function loadApprovedTutors(token){

fetch(SCRIPT_URL+"?action=getApprovedTutors&token="+token)
.then(r=>r.json())
.then(data=>{

if(handleAuthError(data)) return;

const tbody=document.querySelector("#approvedTable tbody")
tbody.innerHTML=""

if(!Array.isArray(data)) return

data.forEach(t=>{

tbody.innerHTML+=`
<tr>
<td>${t.name||""}</td>
<td>${t.email||""}</td>
<td>${t.phone||""}</td>
<td>${t.subjects||""}</td>
</tr>`

})

})

}

function loadStudents(token){

fetch(SCRIPT_URL+"?action=getAllStudents&token="+token)
.then(r=>r.json())
.then(data=>{

if(handleAuthError(data)) return;

const tbody=document.querySelector("#studentsTable tbody")
tbody.innerHTML=""

if(!Array.isArray(data)) return

data.forEach(s=>{

tbody.innerHTML+=`
<tr>
<td>${s.name||""}</td>
<td>${s.email||""}</td>
<td>${s.phone||""}</td>
<td>${s.service||""}</td>
<td>${s.tutor||""}</td>
</tr>`

})

})

}

/* ===== ACTIONS ===== */

function approve(email){

const token = localStorage.getItem("adminToken")

fetch(`${SCRIPT_URL}?action=approveTutor&email=${encodeURIComponent(email)}&token=${encodeURIComponent(token)}`)
.then(r=>r.json())
.then(()=>loadApplications(token))

}

function reject(email){

const token = localStorage.getItem("adminToken")

fetch(`${SCRIPT_URL}?action=rejectTutor&email=${encodeURIComponent(email)}&token=${encodeURIComponent(token)}`)
.then(r=>r.json())
.then(()=>loadApplications(token))

}

/* LOGOUT */

function logout(){
localStorage.removeItem("adminToken")
window.location.href = "index.html"
}

</script>

</body>
</html>
