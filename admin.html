<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | C&T Tutorials</title>
<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
h2 { color:#002147; }
.card { background:white; padding:15px; margin:10px 0; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
button { padding:6px 10px; margin:5px; border:none; cursor:pointer; }
.delete { background:red; color:white; }
.approve { background:green; color:white; }
.section { margin-bottom:40px; }
</style>
</head>
<body>

<h1>Admin Dashboard</h1>

<div class="section">
<h2>Pending Tutors</h2>
<div id="pendingTutors"></div>
</div>

<div class="section">
<h2>Approved Tutors</h2>
<div id="approvedTutors"></div>
</div>

<div class="section">
<h2>Student Bookings</h2>
<div id="bookings"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  authDomain: "YOUR-PROJECT.firebaseapp.com",
  projectId: "YOUR-PROJECT-ID",
  storageBucket: "YOUR-PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const pendingDiv = document.getElementById("pendingTutors");
const approvedDiv = document.getElementById("approvedTutors");
const bookingDiv = document.getElementById("bookings");

const tutorsSnap = await getDocs(collection(db, "tutors"));
tutorsSnap.forEach(d=>{
    const t=d.data(); const id=d.id;
    let html = `<div class="card"><b>${t.name}</b> - ${t.subject}<br>${t.bio}<br>`;
    if(!t.approved){
        html+=`<button class="approve" onclick="approveTutor('${id}')">Approve</button>`;
        html+=`<button class="delete" onclick="deleteTutor('${id}')">Delete</button>`;
    } else {
        html+=`<button class="delete" onclick="deleteTutor('${id}')">Remove</button>`;
    }
    html+="</div>";
    if(!t.approved) pendingDiv.innerHTML+=html;
    else approvedDiv.innerHTML+=html;
});

const bookingsSnap = await getDocs(collection(db, "bookings"));
bookingsSnap.forEach(d=>{
    const b=d.data(); const id=d.id;
    bookingDiv.innerHTML+=`<div class="card"><b>${b.studentName}</b> (${b.studentPhone})<br>Subject: ${b.subject}<br>Tutor: ${b.tutor}<br>Date: ${b.date}<br><button class="delete" onclick="deleteBooking('${id}')">Delete</button></div>`;
});

window.approveTutor = async(id)=>{await updateDoc(doc(db,"tutors",id),{approved:true});location.reload();}
window.deleteTutor = async(id)=>{await deleteDoc(doc(db,"tutors",id));location.reload();}
window.deleteBooking = async(id)=>{await deleteDoc(doc(db,"bookings",id));location.reload();}
</script>

</body>
</html>
