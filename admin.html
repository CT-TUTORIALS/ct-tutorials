<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>C&T Tutorials Admin Portal</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.main{
max-width:1100px;
margin:auto;
background:white;
padding:40px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:40px;
}

.stat-box{
background:#003366;
color:white;
padding:20px;
text-align:center;
font-size:18px;
border-radius:6px;
}

button{
padding:8px 12px;
border:none;
color:white;
cursor:pointer;
}

.approve{background:#2e7d32;}
.reject{background:#b71c1c;}
.logout{background:#990000;margin-top:20px;}

.tutor-card{
border:1px solid #ddd;
padding:15px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>Admin Dashboard</h1>
<a href="index.html" style="color:white">Home</a>
</header>

<div class="main">

<div id="loginSection">

<h2>Admin Login</h2>

<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">

<button onclick="adminLogin()">Login</button>

</div>


<div id="dashboard" style="display:none">

<h2>System Statistics</h2>

<div class="stats">

<div class="stat-box">
Total Tutors<br>
<span id="totalTutors">0</span>
</div>

<div class="stat-box">
Approved Tutors<br>
<span id="approvedTutors">0</span>
</div>

<div class="stat-box">
Pending Applications<br>
<span id="pendingTutors">0</span>
</div>

<div class="stat-box">
Total Students<br>
<span id="totalStudents">0</span>
</div>

</div>


<h2>Tutor Applications</h2>

<div id="tutorList">Loading...</div>

<button class="logout" onclick="logoutAdmin()">Logout</button>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxIShwbw27ViNIHCShqkhJv4WaQ0igIE9AQ44FGT9RL1ik4rqeOzi01liVl4vjCFhNqQw/exec"


window.onload=function(){

if(localStorage.getItem("adminLoggedIn")){

loginSection.style.display="none"
dashboard.style.display="block"

loadStats()
loadTutors()

}

}



function adminLogin(){

const user=document.getElementById("adminUser").value
const pass=document.getElementById("adminPass").value

if(user==="admin" && pass==="3545Sh@kes"){

localStorage.setItem("adminLoggedIn","true")

loginSection.style.display="none"
dashboard.style.display="block"

loadStats()
loadTutors()

}
else{
alert("Invalid admin credentials")
}

}



function loadStats(){

fetch(SCRIPT_URL+"?action=getAdminStats")

.then(r=>r.json())

.then(stats=>{

totalTutors.innerText=stats.totalTutors
approvedTutors.innerText=stats.approvedTutors
pendingTutors.innerText=stats.pendingTutors
totalStudents.innerText=stats.totalStudents

})

}



function loadTutors(){

fetch(SCRIPT_URL+"?action=getTutorApplications")

.then(r=>r.json())

.then(tutors=>{

let html=""

tutors.forEach((t,i)=>{

html+=`

<div class="tutor-card">

<b>${t.name}</b><br>
${t.email}<br>
Subjects: ${t.subjects}<br><br>

<button class="approve" onclick="approveTutor(${i})">Approve</button>

<button class="reject" onclick="rejectTutor(${i})">Reject</button>

</div>

`

})

tutorList.innerHTML=html

})

}



function approveTutor(index){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"approveTutor",
index:index
})
})
.then(()=>{

loadStats()
loadTutors()

})

}



function rejectTutor(index){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"rejectTutor",
index:index
})
})
.then(()=>{

loadStats()
loadTutors()

})

}



function logoutAdmin(){

localStorage.removeItem("adminLoggedIn")

location.reload()

}

</script>

</body>
</html>
