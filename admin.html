<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials | Admin Panel</title>

<style>

body{
font-family:"Segoe UI",Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */

.admin-header{
background:#003366;
color:white;
padding:15px;
position:sticky;
top:0;
z-index:1000;
}

.admin-nav{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
align-items:center;
}

.admin-nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.logout{
background:#c62828;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

/* CONTENT */

.container{
max-width:1200px;
margin:auto;
padding:40px 25px;
display:none;
}

h2{
color:#003366;
border-bottom:2px solid #003366;
padding-bottom:6px;
}

section{
margin-bottom:70px;
}

/* TABLES */

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:10px;
border:1px solid #ddd;
font-size:14px;
}

th{
background:#003366;
color:white;
}

button{
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

.approve{background:#2e7d32;color:white;}
.reject{background:#c62828;color:white;}

/* LOGIN */

.login-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:30px;
width:320px;
border-radius:8px;
text-align:center;
}

.login-box input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:4px;
}

.login-btn{
background:#003366;
color:white;
width:100%;
padding:10px;
margin-top:10px;
}

.error{
color:red;
display:none;
font-size:13px;
}

</style>
</head>

<body>

<div class="login-overlay" id="loginOverlay">

<div class="login-box">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button class="login-btn" onclick="adminLogin()">Login</button>

<p id="error" class="error">Invalid credentials</p>

</div>
</div>

<div class="admin-header">
<div class="admin-nav">
<a href="index.html">Home</a>
<span id="adminLinks" style="display:none;">
<a href="#applications">Applications</a>
<a href="#approved">Approved Tutors</a>
<a href="#students">Students</a>
<span class="logout" onclick="logout()">Logout</span>
</span>
</div>
</div>

<div class="container" id="adminContent">

<section>
<h2>Tutor Applications</h2>
<table id="applicationsTable">
<thead><tr>
<th>Name</th><th>Email</th><th>Phone</th><th>Subjects</th><th>Status</th><th>Approve</th>
</tr></thead>
<tbody></tbody>
</table>
</section>

<section>
<h2>Approved Tutors</h2>
<table id="approvedTable">
<thead><tr>
<th>Name</th><th>Email</th><th>Phone</th><th>Subjects</th>
</tr></thead>
<tbody></tbody>
</table>
</section>

<section>
<h2>Students</h2>
<table id="studentsTable">
<thead><tr>
<th>Name</th><th>Email</th><th>Phone</th><th>Service</th><th>Tutor</th>
</tr></thead>
<tbody></tbody>
</table>
</section>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxIShwbw27ViNIHCShqkhJv4WaQ0igIE9AQ44FGT9RL1ik4rqeOzi01liVl4vjCFhNqQw/exec";

/* LOGIN */

function adminLogin(){

const u=document.getElementById("username").value;
const p=document.getElementById("password").value;

fetch(`${SCRIPT_URL}?action=adminLogin&username=${u}&password=${p}`)
.then(r=>r.json())
.then(data=>{

if(data.success){

localStorage.setItem("adminToken",data.token)

document.getElementById("loginOverlay").style.display="none"
document.getElementById("adminContent").style.display="block"
document.getElementById("adminLinks").style.display="flex"

loadAdminData()

}else{
document.getElementById("error").style.display="block"
}

})

}

/* LOAD DATA */

function loadAdminData(){

fetch(`${SCRIPT_URL}?action=adminStats`)
.then(r=>r.json())
.then(data=>{

document.getElementById("applicationsTable").querySelector("tbody").innerHTML=""
document.getElementById("approvedTable").querySelector("tbody").innerHTML=""

alert("Admin stats loaded successfully")

})

}

/* APPROVE */

function approveTutor(email){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({type:"approveTutor",email:email})
}).then(()=>loadAdminData())

}

/* LOGOUT */

function logout(){
localStorage.removeItem("adminToken")
location.reload()
}

</script>

</body>
</html>
