<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials Admin</title>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  text-align:center;
  margin:0;
}
header{
  background:#1e88e5;
  color:white;
  padding:20px;
}
section{
  padding:40px;
}
table{
  width:90%;
  margin:auto;
  border-collapse: collapse;
  margin-top:20px;
}
th, td{
  border:1px solid #ccc;
  padding:10px;
  text-align:left;
}
th{
  background:#1e88e5;
  color:white;
}
button{
  padding:8px 15px;
  background:#003366;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
button:hover{
  background:#00509e;
}
.delete-btn{
  background:#c62828;
}
.delete-btn:hover{
  background:#b71c1c;
}
footer{
  background:#1e88e5;
  color:white;
  padding:20px;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>C&T Tutorials Admin Dashboard</h1>
</header>

<section>
<h2>Registered Tutors</h2>

<table id="tutorsTable">
<thead>
<tr>
<th>#</th>
<th>Full Name</th>
<th>Email</th>
<th>Password</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<!-- Filled dynamically -->
</tbody>
</table>

<button onclick="refreshTutors()">Refresh List</button>

</section>

<footer>
<p>Admin Panel | C&T Tutorials</p>
</footer>

<script>
// Function to load tutors from localStorage and display in table
function refreshTutors(){
  const tutors = JSON.parse(localStorage.getItem('tutors')) || [];
  const tbody = document.querySelector("#tutorsTable tbody");
  tbody.innerHTML = ""; // clear existing rows

  tutors.forEach((tutor, index)=>{
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${index+1}</td>
      <td>${tutor.name}</td>
      <td>${tutor.email}</td>
      <td>${tutor.password}</td>
      <td><button class="delete-btn" onclick="deleteTutor(${index})">Delete</button></td>
    `;
    tbody.appendChild(row);
  });
}

// Delete a tutor by index
function deleteTutor(index){
  if(confirm("Are you sure you want to delete this tutor?")){
    let tutors = JSON.parse(localStorage.getItem('tutors')) || [];
    tutors.splice(index,1); // remove tutor at index
    localStorage.setItem('tutors', JSON.stringify(tutors));
    refreshTutors(); // refresh table
  }
}

// Initial load
refreshTutors();
</script>

</body>
</html>
