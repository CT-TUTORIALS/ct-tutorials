<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal | C&T Tutorials</title>
<style>
body{margin:0;font-family:"Segoe UI", Arial, sans-serif;background:#f4f4f4;color:#333;}
header{background:#003366;color:white;padding:20px;text-align:center;}
h1,h2{color:#003366;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ccc;padding:10px;text-align:left;}
th{background:#003366;color:white;}
button{padding:6px 12px;margin-right:5px;border:none;border-radius:4px;cursor:pointer;}
button.approve{background:#28a745;color:white;}
button.decline{background:#dc3545;color:white;}
button.approve:hover{background:#218838;}
button.decline:hover{background:#c82333;}
.container{max-width:1200px;margin:auto;padding:20px;background:white;}
</style>
</head>
<body>

<header>
<h1>Admin Portal | C&T Tutorials</h1>
</header>

<div class="container">
<h2>Pending Tutor Applications</h2>
<table id="tutorTable">
<thead>
<tr>
<th>#</th>
<th>Full Name</th>
<th>Email</th>
<th>Phone</th>
<th>Subjects</th>
<th>Qualification</th>
<th>Experience</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
<tr><td colspan="9">Loading applications...</td></tr>
</tbody>
</table>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxD8eu_GZrIX9hRNSV9LNEZw-05vno7EgyN6r1S7Z-CdZfHeg-JhhDF7Yv-OcJbpvVpmA/exec";

function loadApplications(){
  fetch(SCRIPT_URL+"?action=getAllTutors")
    .then(res=>res.json())
    .then(data=>{
      const tbody=document.querySelector("#tutorTable tbody");
      tbody.innerHTML="";
      if(data.length===0){tbody.innerHTML="<tr><td colspan='9'>No applications found</td></tr>"; return;}
      data.forEach((t,index)=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`
          <td>${index+1}</td>
          <td>${t.name}</td>
          <td>${t.email}</td>
          <td>${t.phone}</td>
          <td>${t.subjects}</td>
          <td>${t.qualification}</td>
          <td>${t.experience}</td>
          <td>${t.status}</td>
          <td>
            <button class="approve" onclick="updateStatus(${index},'Approved')">Approve</button>
            <button class="decline" onclick="updateStatus(${index},'Declined')">Decline</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    })
    .catch(err=>console.error("Error loading tutors:",err));
}

function updateStatus(index,status){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({action:"updateStatus",index:index,status:status})
  }).then(res=>res.json())
    .then(r=>{loadApplications();})
    .catch(err=>alert("Error updating status"));
}

// Initial load
loadApplications();
</script>

</body>
</html>
