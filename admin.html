<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#003366;color:white;padding:15px;text-align:center;}
section{padding:20px;}
button{padding:8px 12px;margin-top:5px;}
.card{background:white;padding:15px;margin-bottom:10px;border-radius:6px;}
</style>
</head>
<body>

<header>
<h2>Admin Dashboard</h2>
<button id="logoutBtn">Logout</button>
</header>

<section id="loginSection">
<h3>Admin Login</h3>
<input type="email" id="adminEmail" placeholder="Email"><br><br>
<input type="password" id="adminPassword" placeholder="Password"><br><br>
<button id="loginBtn">Login</button>
</section>

<section id="dashboard" style="display:none;">
<h3>Pending Tutor Applications</h3>
<div id="tutorsList"></div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = { YOUR_CONFIG_HERE };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const loginSection=document.getElementById("loginSection");
const dashboard=document.getElementById("dashboard");

document.getElementById("loginBtn").onclick=()=>{
signInWithEmailAndPassword(auth,
adminEmail.value,
adminPassword.value
);
};

onAuthStateChanged(auth,user=>{
if(user){
loginSection.style.display="none";
dashboard.style.display="block";
loadTutors();
}else{
loginSection.style.display="block";
dashboard.style.display="none";
}
});

async function loadTutors(){
const querySnapshot=await getDocs(collection(db,"tutors"));
const list=document.getElementById("tutorsList");
list.innerHTML="";
querySnapshot.forEach(docSnap=>{
const data=docSnap.data();
if(!data.approved){
list.innerHTML+=`
<div class="card">
<strong>${data.name}</strong><br>
${data.email}<br>
${data.subject}<br>
<a href="${data.cvURL}" target="_blank">View CV</a><br>
<button onclick="approveTutor('${docSnap.id}','${data.email}','${data.name}')">Approve</button>
</div>
`;
}
});
}

window.approveTutor=async(id,email,name)=>{
await updateDoc(doc(db,"tutors",id),{approved:true});
alert("Tutor Approved.");
loadTutors();
};

logoutBtn.onclick=()=>signOut(auth);
</script>

</body>
</html>
