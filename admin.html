<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials Admin Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
padding-bottom:70px;
}

/* HEADER */

header{
background:#003366;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

/* DASHBOARD */

#dashboard{
display:none;
padding:40px;
}

.dashboard-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-top:20px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
text-align:center;
}

.card h3{
margin:0;
color:#003366;
}

.stat{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

/* LOGIN MODAL */

#loginModal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

#loginModal form{
background:white;
padding:30px;
width:320px;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
background:#003366;
color:white;
border-radius:5px;
cursor:pointer;
}

/* FOOTER */

footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#003366;
color:white;
text-align:center;
padding:12px;
font-size:13px;
}

</style>
</head>

<body>

<header>
C&T Tutorials Admin Dashboard
</header>

<div id="loginModal">

<form id="loginForm">

<input type="text" id="username" required>

<label>Password</label>
<input type="password" id="password" required>

<button type="submit">Login</button>

</form>

</div>

<div id="dashboard">

<h1>Platform Overview</h1>

<div class="dashboard-grid">

<div class="card">
<h3>Registered Students</h3>
<div class="stat">--</div>
</div>

<div class="card">
<h3>Approved Tutors</h3>
<div class="stat">--</div>
</div>

<div class="card">
<h3>Pending Tutor Applications</h3>
<div class="stat">--</div>
</div>

<div class="card">
<h3>Sessions Scheduled</h3>
<div class="stat">--</div>
</div>

</div>

</div>

<footer>

<strong>C&T Tutorials Administration System</strong><br>

Email: ct0tutorials@gmail.com | Phone: +264 815 621 879 / +264 818 479 958<br>

© 2026 C&T Tutorials

</footer>

</body>
</html>
