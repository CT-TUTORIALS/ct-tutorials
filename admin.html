<!DOCTYPE html>
<html>
<head>

<title>C&T Tutorials Admin</title>

<style>

body{font-family:Arial;background:#f4f4f4}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
padding:10px 15px;
background:#003366;
color:white;
border:none;
margin-top:15px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #ddd;
padding:10px;
}

th{
background:#003366;
color:white;
}

</style>

</head>

<body>

<div class="container" id="loginPage">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error" style="color:red"></p>

</div>


<div class="container" id="dashboard" style="display:none">

<h2>Tutor Applications</h2>

<table id="table">

<thead>

<tr>

<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Subjects</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>


<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyc3T_2QAX2LKbJE4mPPYztVrBj7gE0BCHb9otc4JPkctR_yY6U381B0uX3MYjv_tzoQg/exec";


function login(){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"adminLogin",
user:document.getElementById("user").value,
pass:document.getElementById("pass").value
})
})

.then(res=>res.json())

.then(data=>{

if(data.success){

document.getElementById("loginPage").style.display="none";

document.getElementById("dashboard").style.display="block";

loadTutors();

}else{

document.getElementById("error").innerText="Invalid login";

}

});

}



function loadTutors(){

fetch(SCRIPT_URL+"?action=getAllTutors")

.then(res=>res.json())

.then(tutors=>{

const tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

tutors.forEach((t,i)=>{

const row=document.createElement("tr");

row.innerHTML=`

<td>${t.name}</td>
<td>${t.email}</td>
<td>${t.phone}</td>
<td>${t.subjects}</td>
<td>${t.status}</td>

<td>

<button onclick="update(${i},'Approved')">Approve</button>

<button onclick="update(${i},'Rejected')">Reject</button>

</td>

`;

tbody.appendChild(row);

});

});

}



function update(index,status){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"updateStatus",
index:index,
status:status
})
})

.then(res=>res.json())
.then(data=>{
loadTutors();
});

}

</script>

</body>
</html>
