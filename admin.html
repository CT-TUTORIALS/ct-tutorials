<!DOCTYPE html>
<html>
<head>

<title>C&T Tutorials Admin</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:300px;

}

input{

width:100%;
padding:10px;
margin:10px 0;

}

button{

width:100%;
padding:10px;
background:#003366;
color:white;
border:none;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<script>

function login(){

const user=document.getElementById("username").value;
const pass=document.getElementById("password").value;

if(user==="admin" && pass==="3545Sh@kes"){

window.location.href="dashboard.html";

}

else{

alert("Incorrect login");

}

}

</script>

</body>
</html>
