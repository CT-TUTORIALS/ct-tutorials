<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials | Admin Portal</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:#f4f4f4;
}
header{
  background:#003366;
  color:white;
  padding:20px;
  text-align:center;
}
nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
  cursor:pointer;
}
.main{
  max-width:1000px;
  margin:auto;
  background:white;
  padding:40px;
}
h2{color:#003366;}
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}
.modal form{
  background:white;
  padding:25px;
  width:90%;
  max-width:450px;
  border-radius:8px;
}
input{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:15px;
}
button{
  background:#003366;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
  width:100%;
}
.card{
  border:1px solid #ddd;
  padding:15px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h1>C&T Tutorials Admin Portal</h1>
<nav>
<a onclick="openLogin()">Login</a>
<a onclick="showTutors()">Tutors' List</a>
<a onclick="showStudents()">Students' List</a>
<a href="index.html">Home</a>
</nav>
</header>

<div class="main">
<h2>Tutor Applications</h2>
<div id="tutorList">Loading tutor applications...</div>

<h2>Registered Students</h2>
<div id="studentList">Loading student registrations...</div>
</div>

<div class="modal" id="loginModal">
<form>
<button type="button" class="close" onclick="closeLogin()">×</button>
<h2>Admin Login</h2>
<label>Username
<input type="text" id="adminUsername" required>
</label>
<label>Password
<input type="password" id="adminPassword" required>
</label>
<button type="submit" class="submit-btn">Login</button>
</form>
</div>

<!-- ===================== FOOTER ===================== -->
<footer style="background:#003366;color:white;text-align:center;padding:20px;margin-top:40px;">
  <p>
    C&amp;T Tutorials Admin Portal – Manage tutor approvals and student registrations. 
    Contact: <a href="mailto:ct0tutorials@gmail.com" style="color:white;text-decoration:underline;">ct0tutorials@gmail.com</a>
  </p>
</footer>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyprzZlwHhWkoAA8suvmTU0_alu22iJOf5SEcFmen1Efh-WMjBIoA67gzxMvZobMNh9HQ/exec"

function openLogin(){loginModal.style.display="flex"}
function closeLogin(){loginModal.style.display="none"}

window.onclick=function(e){
  if(e.target.classList.contains("modal")) e.target.style.display="none"
}

/* ADMIN LOGIN */
loginModal.querySelector("form").addEventListener("submit",function(e){
  e.preventDefault()
  const username=document.getElementById("adminUsername").value
  const password=document.getElementById("adminPassword").value
  if(username==="admin" && password==="3545Sh@kes"){
    alert("Login successful!")
    closeLogin()
    loadTutors()
    loadStudents()
  } else {
    alert("Invalid credentials")
  }
})

/* SHOW LISTS */
function showTutors(){openLogin()}
function showStudents(){openLogin()}

function loadTutors(){
  fetch(SCRIPT_URL+"?action=getTutorApplications")
  .then(r=>r.json())
  .then(data=>{
    let html=""
    data.forEach(t=>{
      html+=`<div class="card"><b>${t.name}</b> - ${t.email} - ${t.phone} - ${t.subjects} - ${t.qualification} - ${t.experience} - ${t.status}</div>`
    })
    tutorList.innerHTML=html
  })
}

function loadStudents(){
  fetch(SCRIPT_URL+"?action=getStudentRegistrations")
  .then(r=>r.json())
  .then(data=>{
    let html=""
    data.forEach(s=>{
      html+=`<div class="card"><b>${s.name}</b> - ${s.email} - ${s.cell_number} - ${s.service} - ${s.tutor}</div>`
    })
    studentList.innerHTML=html
  })
}
</script>

</body>
</html>
