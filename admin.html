<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>C&T Tutorials Admin Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#003366;
color:white;
}

button{
padding:8px 12px;
border:none;
cursor:pointer;
}

.approve{
background:green;
color:white;
}

.reject{
background:red;
color:white;
}

</style>

</head>

<body>

<header>

<h1>C&T Tutorials Admin Dashboard</h1>

</header>

<div class="container">

<h2>Tutor Applications</h2>

<table id="tutorTable">

<thead>

<tr>

<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Subjects</th>
<th>Qualification</th>
<th>Experience</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyc3T_2QAX2LKbJE4mPPYztVrBj7gE0BCHb9otc4JPkctR_yY6U381B0uX3MYjv_tzoQg/exec";

/* LOAD TUTOR APPLICATIONS */

function loadTutors(){

fetch(SCRIPT_URL+"?action=getAllTutors")

.then(res=>res.json())

.then(tutors=>{

const table=document.querySelector("#tutorTable tbody");

table.innerHTML="";

tutors.forEach((tutor,index)=>{

const row=document.createElement("tr");

row.innerHTML=`

<td>${tutor.name}</td>
<td>${tutor.email}</td>
<td>${tutor.phone}</td>
<td>${tutor.subjects}</td>
<td>${tutor.qualification}</td>
<td>${tutor.experience}</td>
<td>${tutor.status}</td>

<td>

<button class="approve" onclick="updateStatus(${index},'Approved')">Approve</button>

<button class="reject" onclick="updateStatus(${index},'Rejected')">Reject</button>

</td>

`;

table.appendChild(row);

});

});

}

/* UPDATE STATUS */

function updateStatus(index,status){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"updateStatus",
index:index,
status:status
})
})

.then(res=>res.json())

.then(data=>{

alert("Tutor status updated");

loadTutors();

});

}

window.onload=loadTutors;

</script>

</body>

</html>
