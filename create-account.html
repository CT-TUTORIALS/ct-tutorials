<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Tutor Account - C&T Tutorials</title>
<style>
body{font-family:"Segoe UI", Arial,sans-serif;background:#f4f4f4}
.container{max-width:500px;margin:auto;padding:40px;background:white;margin-top:50px;border-radius:10px}
input{width:100%;padding:10px;margin:10px 0;}
button{padding:10px;background:#003366;color:white;border:none;width:100%;}
#error{color:red;margin-top:10px;}
</style>
</head>
<body>
<div class="container">
<h2>Create Tutor Account</h2>
<input id="accessCode" placeholder="Access Code">
<input id="password" type="password" placeholder="New Password">
<button onclick="createAccount()">Create Account</button>
<p id="error"></p>
<p id="success" style="color:green;"></p>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxsXkwPLpdTK9oiBayEl_-TkN_T2x3SubSrjk-0TIC3eYbwbgD1-coQjNk0PqDmJDd35w/exec";

function createAccount(){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      type:"createTutorAccount",
      accessCode:document.getElementById("accessCode").value,
      password:document.getElementById("password").value
    })
  }).then(res=>res.json())
    .then(data=>{
      if(data.status==="account_created"){
        document.getElementById("success").innerText="Account created! You can now login.";
        document.getElementById("error").innerText="";
      } else {
        document.getElementById("error").innerText="Invalid Access Code.";
        document.getElementById("success").innerText="";
      }
    });
}
</script>
</body>
</html>
