<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials - Tutor Application</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:#f4f4f4;
}
.container{
  max-width:500px;
  margin:auto;
  margin-top:40px;
  padding:30px;
  background:white;
  border-radius:8px;
  border:1px solid #ddd;
}
input, select, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
}
button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#003366;
  color:white;
  border:none;
  cursor:pointer;
}
#message{
  margin-top:15px;
  color:red;
}
</style>
</head>

<body>

<div class="container">
<h2>Tutor Application</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone Number">

<select id="subjects">
  <option value="">Select Subject</option>
  <option>Intro Academic Writing</option>
  <option>Topic Specific</option>
  <option>Hourly Rate</option>
  <option>Group Sessions</option>
  <option>Draft Editing</option>
  <option>Proofreading</option>
  <option>Referencing Assistance</option>
  <option>Public Speaking Support</option>
  <option>Secondary School Subjects</option>
</select>

<input type="text" id="qualification" placeholder="Qualification">
<textarea id="experience" placeholder="Experience"></textarea>

<button onclick="submitApplication()">Submit Application</button>

<p id="message"></p>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxIShwbw27ViNIHCShqkhJv4WaQ0igIE9AQ44FGT9RL1ik4rqeOzi01liVl4vjCFhNqQw/exec";

async function submitApplication(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const subjects = document.getElementById("subjects").value;
  const qualification = document.getElementById("qualification").value.trim();
  const experience = document.getElementById("experience").value.trim();
  const msg = document.getElementById("message");

  msg.style.color="red";

  if(!name || !email || !phone || !subjects || !qualification || !experience){
    msg.innerText="Please fill in all fields.";
    return;
  }

  try{

    // ✅ get token
    const tokenRes = await fetch(`${SCRIPT_URL}?action=getToken`);
    const tokenData = await tokenRes.json();

    const res = await fetch(SCRIPT_URL,{
      method:"POST",
      body: JSON.stringify({
        type:"tutorApplication",
        name:name,
        email:email,
        phone:phone,
        subjects:subjects,
        qualification:qualification,
        experience:experience,
        token:tokenData.token
      })
    });

    const data = await res.json();

    if(data.status==="success"){
      msg.style.color="green";
      msg.innerText="Application submitted successfully!";

    } else if(data.status==="duplicate_detected"){
      msg.innerText="You have already applied.";

    } else {
      msg.innerText="Something went wrong.";
    }

  }catch(e){
    msg.innerText="Error connecting to server.";
  }
}
</script>

</body>
</html>
