<!DOCTYPE html>
<html>
<head>

<title>C&T Tutorials Student Booking</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:40px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
}

button{
background:#003366;
color:white;
padding:12px;
border:none;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Registration</h2>

<form id="studentForm">

<label>Name</label>
<input id="name" required>

<label>Email</label>
<input id="email" required>

<label>Cell Number</label>
<input id="cell" required>

<label>Service</label>
<select id="service">
<option>Exam Preparation</option>
<option>Assignment Assistance</option>
<option>One on One Tutoring</option>
</select>

<label>Select Tutor</label>
<select id="tutor"></select>

<button type="submit">Register</button>

</form>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyc3T_2QAX2LKbJE4mPPYztVrBj7gE0BCHb9otc4JPkctR_yY6U381B0uX3MYjv_tzoQg/exec";

/* LOAD TUTORS */

function loadTutors(){

fetch(SCRIPT_URL+"?action=getTutors")

.then(res=>res.json())

.then(tutors=>{

const select=document.getElementById("tutor");

select.innerHTML="";

tutors.forEach(t=>{

const option=document.createElement("option");

option.value=t.name;

option.text=t.name+" - "+t.subject;

select.appendChild(option);

});

});

}

window.onload=loadTutors;

/* REGISTER STUDENT */

document.getElementById("studentForm").addEventListener("submit",function(e){

e.preventDefault();

const data={
action:"registerStudent",
name:document.getElementById("name").value,
email:document.getElementById("email").value,
cell_number:document.getElementById("cell").value,
service:document.getElementById("service").value,
tutor:document.getElementById("tutor").value
};

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(data=>{
alert("Registration successful");
document.getElementById("studentForm").reset();
});

});

</script>

</body>
</html>
