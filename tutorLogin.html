<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor Login</title>

<style>
body{font-family:Arial;background:#f4f4f4;}
.container{max-width:400px;margin:auto;margin-top:50px;background:#fff;padding:30px;border-radius:8px;}
input,button{width:100%;padding:10px;margin-top:10px;}
button{background:#003366;color:white;border:none;}
#message{margin-top:10px;}
.link{text-align:center;margin-top:15px;}
</style>
</head>

<body>

<div class="container">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="message"></p>

<div class="link">
No account? <a href="tutorCreateAccount.html">Create one</a>
</div>

</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxIShwbw27ViNIHCShqkhJv4WaQ0igIE9AQ44FGT9RL1ik4rqeOzi01liVl4vjCFhNqQw/exec";

function login(){

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();
const msg=document.getElementById("message");

fetch(`${SCRIPT_URL}?action=tutorLogin&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`)
.then(r=>r.json())
.then(d=>{
if(d.success){
localStorage.setItem("tutorToken",d.token);
localStorage.setItem("tutorName",d.name);
location="tutors.html";
}else{
msg.innerText="Login failed";
}
});
}
</script>

</body>
</html>
