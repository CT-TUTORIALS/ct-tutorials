<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials - Tutor Login</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:#f4f4f4;
}
.container{
  max-width:400px;
  margin:auto;
  margin-top:50px;
  padding:30px;
  background:white;
  border-radius:8px;
  border:1px solid #ddd;
}
input{
  width:100%;
  padding:10px;
  margin-top:10px;
}
button{
  width:100%;
  padding:10px;
  margin-top:15px;
  background:#003366;
  color:white;
  border:none;
  cursor:pointer;
}
#message{
  margin-top:15px;
  color:red;
}
</style>
</head>

<body>

<div class="container">
<h2>Tutor Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="loginTutor()">Login</button>

<p id="message"></p>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxIShwbw27ViNIHCShqkhJv4WaQ0igIE9AQ44FGT9RL1ik4rqeOzi01liVl4vjCFhNqQw/exec";

function loginTutor(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("message");

  msg.style.color="red";

  if(!email || !password){
    msg.innerText="Please enter email and password.";
    return;
  }

  fetch(`${SCRIPT_URL}?action=tutorLogin&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`)
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      msg.style.color="green";
      msg.innerText="Login successful! Redirecting...";

      // store session token
      localStorage.setItem("tutorToken", data.token);
      localStorage.setItem("tutorName", data.name);

      setTimeout(()=>{window.location="tutors.html";},1000);

    } else {
      msg.innerText="Invalid credentials or not approved yet.";
    }
  })
  .catch(()=>{
    msg.innerText="Error connecting to server.";
  });
}
</script>

</body>
</html>
