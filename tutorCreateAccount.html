<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&T Tutorials - Tutor Account Creation</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:#f4f4f4;
}
.container{
  max-width:400px;
  margin:auto;
  margin-top:50px;
  padding:30px;
  background:white;
  border-radius:8px;
  border:1px solid #ddd;
}
input{
  width:100%;
  padding:10px;
  margin-top:10px;
}
button{
  width:100%;
  padding:10px;
  margin-top:15px;
  background:#003366;
  color:white;
  border:none;
  cursor:pointer;
}
#message{
  margin-top:15px;
  color:red;
}
</style>
</head>

<body>

<div class="container">
<h2>Create Tutor Account</h2>

<input type="email" id="email" placeholder="Email (used in application)">
<input type="text" id="accessCode" placeholder="Access Code">
<input type="password" id="password" placeholder="Set Password">
<button onclick="createAccount()">Submit</button>

<p id="message"></p>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxIShwbw27ViNIHCShqkhJv4WaQ0igIE9AQ44FGT9RL1ik4rqeOzi01liVl4vjCFhNqQw/exec";

async function createAccount(){

  const email = document.getElementById("email").value.trim();
  const accessCode = document.getElementById("accessCode").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("message");

  msg.style.color="red";

  if(!email || !accessCode || !password){
    msg.innerText="Please fill in all fields.";
    return;
  }

  try{

    // ✅ get token first
    const tokenRes = await fetch(`${SCRIPT_URL}?action=getToken`);
    const tokenData = await tokenRes.json();

    const res = await fetch(SCRIPT_URL,{
      method:"POST",
      body: JSON.stringify({
        type:"createTutorAccount",
        email:email,
        accessCode:accessCode,
        password:password,
        token:tokenData.token
      })
    });

    const data = await res.json();

    if(data.status==="account_created"){
      msg.style.color="green";
      msg.innerText="Account successfully created! You can now login.";
      setTimeout(()=>{window.location="tutorLogin.html";},2000);

    } else if(data.status==="invalid_code"){
      msg.innerText="Invalid access code.";

    } else if(data.status==="not_approved"){
      msg.innerText="Your application is not approved yet.";

    } else if(data.status==="account_exists"){
      msg.innerText="Account already exists.";

    } else {
      msg.innerText="Something went wrong, try again.";
    }

  }catch(e){
    msg.innerText="Error connecting to server.";
  }
}
</script>

</body>
</html>
