<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Tutor Account</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:#f4f4f4;
}
.container{
  max-width:400px;
  margin:auto;
  margin-top:50px;
  padding:30px;
  background:white;
  border-radius:8px;
}
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
}
button{
  background:#003366;
  color:white;
  border:none;
}
#message{margin-top:10px;}
.link{text-align:center;margin-top:15px;}
</style>
</head>

<body>

<div class="container">
<h2>Create Account</h2>

<input type="email" id="email" placeholder="Email">
<input type="text" id="accessCode" placeholder="Access Code">
<input type="password" id="password" placeholder="Password">

<button onclick="createAccount()">Create Account</button>

<p id="message"></p>

<div class="link">
Already have account? <a href="tutorLogin.html">Login</a>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxIShwbw27ViNIHCShqkhJv4WaQ0igIE9AQ44FGT9RL1ik4rqeOzi01liVl4vjCFhNqQw/exec";

async function createAccount(){

  const email=document.getElementById("email").value.trim();
  const accessCode=document.getElementById("accessCode").value.trim();
  const password=document.getElementById("password").value.trim();
  const msg=document.getElementById("message");

  msg.style.color="red";

  if(!email || !accessCode || !password){
    msg.innerText="Fill all fields.";
    return;
  }

  const tokenRes=await fetch(`${SCRIPT_URL}?action=getToken`);
  const tokenData=await tokenRes.json();

  const res=await fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      type:"createTutorAccount",
      email,
      accessCode,
      password,
      token:tokenData.token
    })
  });

  const data=await res.json();

  if(data.status==="account_created"){
    msg.style.color="green";
    msg.innerText="Account created!";
    setTimeout(()=>location="tutorLogin.html",1500);
  } else {
    msg.innerText="Failed: "+data.status;
  }
}
</script>

</body>
</html>
